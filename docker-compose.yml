services:
  backend:
    build: .
    ports:
      - "5001:5001"
    volumes:
      - ./Backend:/app
    env_file:
      - Backend/.env
    environment:
      DATABASE_URL: postgresql://flyplay:flyplay@postgres:5432/flyplay
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: flyplay_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: flyplay
      POSTGRES_USER: flyplay
      POSTGRES_PASSWORD: flyplay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flyplay -d flyplay"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4
    container_name: flyplay_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@flyplay.com  # 登入 pgAdmin 網頁的帳號
      PGADMIN_DEFAULT_PASSWORD: admin           # 登入 pgAdmin 網頁的密碼
    ports:
      - "8080:80"                               # 瀏覽器訪問 http://localhost:8080
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:

services:
  backend:
    build: .
    ports:
      - "5001:5001"
    volumes:
      - ./Backend:/app
    env_file:
      - Backend/.env
    environment:
      DATABASE_URL: postgresql://flyplay:flyplay@postgres:5432/flyplay
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: flyplay_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: flyplay
      POSTGRES_USER: flyplay
      POSTGRES_PASSWORD: flyplay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flyplay -d flyplay"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

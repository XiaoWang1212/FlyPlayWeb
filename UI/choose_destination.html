<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>目的地選擇</title>
    <link rel="stylesheet" href="css/choose_destination.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <button class="back-btn" onclick="goBackWithTransition('setup.html')">返回</button>
            <h1>目的地選擇</h1>
        </header>

        <div class="selected-area" id="selected-area">
            <div class="selected-label">已選目的地</div>
            <div class="selected-list" id="selected-list">
                <span class="no-selection">尚未選擇目的地</span>
            </div>
        </div>

        <div class="search-box">
            <input
                type="text"
                id="search-input"
                placeholder="搜尋城市或地區"
                oninput="searchDestination()"
            >
        </div>

        <div class="destination-list" id="destination-list">
        </div>

        <button class="confirm-btn" id="confirm-btn" onclick="confirmSelection()" disabled>
            確認選擇
        </button>
    </div>

    <script src="js/page_transition.js"></script>
    <script src="js/choose_destination.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>旅程規劃</title>
        <link rel="stylesheet" href="css/setup.css" />
    </head>
    <body>
        <!-- 飛機 overlay 由 js/flight-animation.js 動態注入 -->
        <div class="container">
            <button class="back-btn" onclick="goBackWithTransition()">
                <img src="assets/icons/back-arrow.svg" alt="返回">
            </button>
            <h1>旅程規劃</h1>
            <!-- 只有表單區域內部捲動，標題/返回鍵維持固定 -->
            <div class="form-scroll">
            <div class="form-group">
                <label>抵達機場</label>
                <div class="select-wrapper">
                    <button class="destination-btn" onclick="goToDeparturePage()">
                        <span id="selected-departure">請選擇抵達機場</span>
                        <span class="arrow-icon">›</span>
                    </button>
                </div>
            </div>

            <div class="form-group layer-above">
                <label class="label-with-hint">目的地<span class="label-hint">依機場而定</span></label>
                <div class="select-wrapper">
                    <button class="destination-btn" onclick="goToDestinationPage()">
                        <span id="selected-destination">請選擇目的地</span>
                        <span class="arrow-icon">›</span>
                    </button>
                </div>
            </div>

            <!-- 可展開的天數選擇器 -->
            <div class="form-group expandable-picker" id="days-picker-group">
                <div class="picker-header" onclick="toggleDaysPicker()">
                    <label class="label-with-hint">天數<span class="label-hint">不含出發及返程日</span></label>
                    <div class="picker-display">
                        <span id="selected-days">選擇天數</span>
                        <span class="arrow-icon">›</span>
                    </div>
                </div>
                <div class="picker-body-inline">
                    <div class="picker-highlight-inline"></div>
                    <div class="picker-scroll-inline" id="days-picker-scroll">
                    </div>
                </div>
            </div>

            <!-- 旅伴選擇器（卡片式 + icon） -->
            <div class="form-group card-picker-group layer-above" id="companion-picker-group">
                <div class="picker-header" onclick="toggleCompanionPicker()">
                    <label>旅伴</label>
                    <div class="picker-display">
                        <span id="selected-companion">任何旅伴</span>
                        <span class="arrow-icon">›</span>
                    </div>
                </div>
                <div class="card-picker-body">
                    <div class="card-picker-grid" id="companion-cards">
                        <!-- 旅伴卡片會由 JavaScript 動態生成 -->
                    </div>
                </div>
            </div>

            <!-- 旅遊類型選擇器（卡片式 + icon） -->
            <div class="form-group card-picker-group" id="travel-type-picker-group">
                <div class="picker-header" onclick="toggleTravelTypePicker()">
                    <label class="label-with-hint">旅遊類型<span class="label-hint">可多選</span></label>
                    <div class="picker-display">
                        <span id="selected-travel-type">任何類型</span>
                        <span class="arrow-icon">›</span>
                    </div>
                </div>
                <div class="card-picker-body">
                    <div class="card-picker-grid" id="travel-type-cards">
                        <!-- 旅遊類型卡片會由 JavaScript 動態生成 -->
                    </div>
                </div>
            </div>

            <!-- 行程緊湊度選擇器 -->
            <div class="form-group card-picker-group layer-above" id="trip-pace-picker-group">
                <div class="picker-header" onclick="toggleTripPacePicker()">
                    <label>行程緊湊度</label>
                    <div class="picker-display">
                        <span id="selected-trip-pace">輕鬆</span>
                        <span class="arrow-icon">›</span>
                    </div>
                </div>
                <div class="card-picker-body">
                    <div class="card-picker-grid cols-2" id="trip-pace-cards">
                        <!-- 行程緊湊度卡片會由 JavaScript 動態生成 -->
                    </div>
                </div>
            </div>
            </div><!-- /.form-scroll -->

            <!-- AI 推薦行程按鈕（預設隱藏，選完旅遊類型才出現） -->
            <button id="ai-recommend-btn" class="ai-recommend-btn" onclick="submitAIRecommendation()">
                AI 推薦行程
            </button>
            
            <!-- 提示缺少欄位 -->
            <div id="missing-field-hint" class="missing-field-hint"></div>

            <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
            <script src="js/page_transition.js"></script>
            <script src="js/flight-animation.js"></script>
            <script src="js/setup.js"></script>
        </body>
    </html>

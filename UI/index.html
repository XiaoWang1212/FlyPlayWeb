    <div class="map-container" id="mapContainer">
      <!-- <div class="map-pin pin-1"><i class="fas fa-map-marker-alt"></i></div>

      <div class="fab-group" id="fabGroup">

      <div class="bottom-sheet" id="bottomSheet">

        <div class="sheet-content" id="sheetContent">

          <!-- 原本的行程表視圖 -->

    <script>
      let map;
      let allDays = [];
      let currentDayIndex = -1;
      const API_BASE = "http://127.0.0.1:5001";

      // 新增：用來記錄目前畫在地圖上的所有路線，方便切換時清除
      let currentRenderers = [];
      let currentMarkers = [];
      let currentInfoWindow = null;
      let justClickedMarker = false;
      let spotPreviewMarker = null;
      let selectedSpotForAdd = null;

      // 新增：清除地圖上現有路線的函數
      function clearMapRoutes() {
        // 清除路線
        currentRenderers.forEach((renderer) => renderer.setMap(null));
        currentRenderers = [];

        // 清除標記
        currentMarkers.forEach((marker) => (marker.map = null));
        currentMarkers = [];
      }

      // 根據日期索引獲取顏色
      function getColorByDay(dayIndex) {
        // 新增：如果是 -1 (代表「全部」按鈕)，給它一個專屬的深灰色
        if (dayIndex === -1) {
          return "#455A64";
        }
        const colors = [
          "#2962FF",
          "#34A853",
          "#EA4335",
          "#FBBC04",
          "#9C27B0",
          "#FFC0CB",
        ];
        return colors[dayIndex % colors.length];
      }

      // 創建日期按鈕
      function createDayButtons() {
        const timelineView = document.getElementById("timelineView");
        const buttonContainer = document.createElement("div");
        buttonContainer.id = "dayButtonContainer";

        const allBtn = document.createElement("button");
        allBtn.textContent = "全部";
        allBtn.classList.add("active"); // 預設為選中狀態

        // 新增：網頁一開始載入時，就幫「全部」按鈕上色
        const allColor = getColorByDay(-1);
        allBtn.style.backgroundColor = allColor;
        allBtn.style.color = "#FFFFFF";
        allBtn.style.borderColor = allColor;

        allBtn.onclick = () => switchDay(-1, allBtn);
        buttonContainer.appendChild(allBtn);
        // -------------------------

        allDays.forEach((day, index) => {
          const btn = document.createElement("button");
          btn.textContent = `第 ${day.day} 天`;
          btn.setAttribute("data-day-index", index);
          btn.onclick = () => switchDay(index, btn);
          buttonContainer.appendChild(btn);
        });

        // 初始化聊天
        window.onload = function () {
          typeMessage(
            "您好！我是飛遊 AI 助手。我可以幫您調整行程、推薦景點、規劃路線，或是回答旅遊相關問題。請告訴我您需要什麼協助？",
            "bot",
          );
        };

        // 把按鈕加到時間線最上方
        timelineView.insertBefore(buttonContainer, timelineView.firstChild);

        // 切換聊天模式
        function toggleChatMode() {
          isChatMode = !isChatMode;

          if (isChatMode) {
            // 進入聊天模式
            timelineView.classList.remove("active");
            chatView.classList.add("active");
            openSheet();
            fabGroup.classList.add("horizontal");
            document.getElementById("editFab").style.display = "none";

            // 改變圖示：機器人 → 列表
            robotFabIcon.classList.remove("fa-robot");
            robotFabIcon.classList.add("fa-list-ul");
          } else {
            // 回到行程表模式
            chatView.classList.remove("active");
            timelineView.classList.add("active");
            sheet.classList.remove("expanded", "half");
            syncSheetState("sheet-collapsed");
            document.getElementById("editFab").style.display = "flex";

            // 恢復圖示：列表 → 機器人
            robotFabIcon.classList.remove("fa-list-ul");
            robotFabIcon.classList.add("fa-robot");
          }
        }
        timelineView.insertBefore(buttonContainer, timelineView.firstChild);
      }

      // 替換為以下這個 async 版本的 addCustomMarkers：
      async function addCustomMarkers(activities, dayIndex) {
        const { AdvancedMarkerElement } =
          await google.maps.importLibrary("marker");
        const color = getColorByDay(dayIndex);

        activities.forEach((activity, actIndex) => {
          // 製作地圖上的圓形小標記
          const markerDiv = document.createElement("div");
          markerDiv.classList.add("custom-marker");
          markerDiv.style.backgroundColor = color;
          markerDiv.innerHTML = `<span>${actIndex + 1}</span>`;

          const photoUrl =
            activity.photos && activity.photos[0]
              ? activity.photos[0].photo_url
              : "";

          const popupCardHTML = `
            <div class="popup-card-content">
              <div class="info-img-wrapper">
                ${
                  photoUrl
                    ? `<img src="${photoUrl}" class="info-img" alt="景點圖片">`
                    : `<div class="info-img" style="display:flex; align-items:center; justify-content:center; color:white;"><i class="far fa-image"></i></div>`
                }
              </div>
              <div class="info-content">
                <div class="info-header">
                  <div class="info-title">${activity.place_name || "未知景點"}</div>
                  <div class="info-time">${activity.time || "時間未定"}</div>
                </div>
                <div class="info-desc" style="-webkit-line-clamp: 1;">${activity.description || "暫無簡介資訊"}</div>
                <div class="info-meta">
                  <div class="info-meta-item"><i class="fas fa-clock"></i> ${activity.opening_hours || activity.time || "營業時間未定"}</div>
                  <div class="info-meta-item"><i class="fas fa-map-marker-alt"></i> ${activity.address || "尚未提供詳細地址"}</div>
                </div>
                ${activity.cost ? `<div class="info-cost">💰 ${activity.cost}</div>` : ""}
              </div>
            </div>
          `;

          const marker = new AdvancedMarkerElement({
            map: map,
            position: activity.location,
            content: markerDiv,
            title: activity.place_name,
          });

          currentMarkers.push(marker);

          marker.addListener("click", (e) => {
            justClickedMarker = true;

            if (currentInfoWindow) {
              currentInfoWindow.close();
            }

            currentInfoWindow = new google.maps.InfoWindow({
              content: `<div style="max-width: 280px;">${popupCardHTML}</div>`,
              maxWidth: 320,
            });

            currentInfoWindow.open({ map, anchor: marker });
          });
        });
      }

      function clearCurrentPopup() {
        if (currentInfoWindow) {
          currentInfoWindow.close();
          currentInfoWindow = null;
        }
      }

      function closeCustomMapPopup() {
        clearCurrentPopup();
      }

      function clearMapRoutes() {
        currentRenderers.forEach((renderer) => renderer.setMap(null));
        currentRenderers = [];

        currentMarkers.forEach((marker) => (marker.map = null));
        currentMarkers = [];

        // 🔺 關鍵修復：切換天數時也清除彈出框
        clearCurrentPopup();
      }

      typeMessage(
        "好的，我已經理解您的需求。根據您的行程安排，我建議可以在大阪城附近增加大阪歷史博物館，這樣可以更深入了解大阪的歷史文化。另外，從道頓堀到心齋橋的路線非常順暢，中間還可以順道逛逛美國村，那裡有很多特色小店和咖啡廳喔！",
        "bot",
      );

      setTimeout(() => {
        sheet.classList.remove("expanded");
        sheet.classList.add("half");
        syncSheetState("sheet-half");
      }, 1000);

      // 逐字顯示訊息（打字機效果）
      function typeMessage(text, type, speed = 30) {
        const div = document.createElement("div");
        div.className = `chat-msg ${type}`;
        document.getElementById("chatMessages").appendChild(div);

        let index = 0;
        const interval = setInterval(() => {
          if (index < text.length) {
            div.textContent += text[index];
            index++;
            scrollToBottom();
          } else {
            clearInterval(interval);
          }
        }, speed);

        return div;
      }

      function appendMsg(text, type) {
        const div = document.createElement("div");
        div.className = `chat-msg ${type}`;
        div.textContent = text;
        document.getElementById("chatMessages").appendChild(div);
        scrollToBottom();
      }
      // 載入單天時間線
      function loadSingleDayTimeline(day, dayIndex) {
        const timelineList = document.getElementById("timelineList");

        // 移除舊的日期標題和活動
        const oldDayTitles = timelineList.querySelectorAll("[data-day-title]");
        const oldItems = timelineList.querySelectorAll(".timeline-item");

        oldDayTitles.forEach((el) => el.remove());
        oldItems.forEach((el) => el.remove());

        // 添加該天的日期標題
        const dayTitle = document.createElement("div");
        dayTitle.setAttribute("data-day-title", "true");
        dayTitle.textContent = `第 ${day.day} 天 - ${day.weekday}`;
        timelineList.appendChild(dayTitle);

        // 添加該天的所有活動
        day.activities.forEach((activity, actIndex) => {
          const isLast = actIndex === day.activities.length - 1;
          const photoUrl =
            activity.photos && activity.photos[0]
              ? activity.photos[0].photo_url
              : "";

          const newItemHTML = `
            <div class="delete-btn" onclick="deleteItem(this)"><i class="fas fa-trash"></i></div>
            
            <div class="location-block">
              <div class="timeline-left">
                <div class="location-img" ${photoUrl ? `style="background-image: url('${photoUrl}'); background-size: cover; background-position: center;"` : ""}>
                  <i class="far fa-image" ${photoUrl ? 'style="display: none;"' : ""}></i>
                </div>
              </div>
              <div class="timeline-right">
                <div class="timeline-title">
                  ${activity.place_name}
                  <span class="time-badge">${activity.time}</span>
                </div>
                <div class="timeline-desc">${activity.description}</div>
                ${activity.cost ? `<div class="activity-cost">💰 ${activity.cost}</div>` : ""}
              </div>
            </div>

            ${
              !isLast
                ? `
            <div class="transit-block">
              <div class="transit-line"></div>
              <div class="transit-data"><i class="fas fa-bus"></i> 預估交通時間...</div>
            </div>
            `
                : '<div style="height: 15px;"></div>'
            } 
          `;

          const div = document.createElement("div");
          div.className = "timeline-item";
          div.dataset.activityId =
            activity.activityId || activity.place_name || String(actIndex);
          div.innerHTML = newItemHTML;
          timelineList.appendChild(div);
        });
      }

      // 載入所有活動的時間線
      function loadAllTimelineActivities() {
        const timelineList = document.getElementById("timelineList");

        // 移除舊的日期標題和活動
        const oldDayTitles = timelineList.querySelectorAll("[data-day-title]");
        const oldItems = timelineList.querySelectorAll(".timeline-item");

        oldDayTitles.forEach((el) => el.remove());
        oldItems.forEach((el) => el.remove());

        allDays.forEach((day, dayIndex) => {
          const dayTitle = document.createElement("div");
          dayTitle.setAttribute("data-day-title", "true");
          dayTitle.textContent = `第 ${day.day} 天 - ${day.weekday}`;
          timelineList.appendChild(dayTitle);

          day.activities.forEach((activity, actIndex) => {
            const isLast = actIndex === day.activities.length - 1;
            const photoUrl =
              activity.photos && activity.photos[0]
                ? activity.photos[0].photo_url
                : "";

            const newItemHTML = `
            <div class="delete-btn" onclick="deleteItem(this)"><i class="fas fa-trash"></i></div>
            
            <div class="location-block">
              <div class="timeline-left">
                <div class="location-img" ${photoUrl ? `style="background-image: url('${photoUrl}'); background-size: cover; background-position: center;"` : ""}>
                  <i class="far fa-image" ${photoUrl ? 'style="display: none;"' : ""}></i>
                </div>
              </div>
              <div class="timeline-right">
                <div class="timeline-title">
                  ${activity.place_name}
                  <span class="time-badge">${activity.time}</span>
                </div>
                <div class="timeline-desc">${activity.description}</div>
                ${activity.cost ? `<div class="activity-cost">💰 ${activity.cost}</div>` : ""}
              </div>
            </div>

            ${
              !isLast
                ? `
            <div class="transit-block">
              <div class="transit-line"></div>
              <div class="transit-data"><i class="fas fa-bus"></i> 預估交通時間...</div>
            </div>
            `
                : '<div style="height: 15px;"></div>'
            } 
          `;

            const div = document.createElement("div");
            div.className = "timeline-item";
            div.dataset.activityId =
              activity.activityId || activity.place_name || String(actIndex);
            div.innerHTML = newItemHTML;
            timelineList.appendChild(div);
          });
        });
      }

      // 顯示所有天的行程
      function displayAllDays() {
        clearMapRoutes(); // 先清除舊路線

        const { DirectionsService, DirectionsRenderer } = google.maps;
        const directionsService = new DirectionsService();

        getActiveDays().forEach((day, dayIndex) => {
          if (!day || !day.activities || day.activities.length < 2) {
            console.warn(`第 ${dayIndex + 1} 天沒有足夠的活動`);
            return;
          }

          const activities = day.activities;
          const directionsService = new DirectionsService();

          const directionsRenderer = new DirectionsRenderer({
            map: map,
            suppressMarkers: true,
            preserveViewport: true,
            polylineOptions: {
              strokeColor: getColorByDay(dayIndex),
              strokeWeight: 7,
              strokeOpacity: 0.6,
            },
          });
          currentRenderers.push(directionsRenderer); // 記錄下來以便日後清除

          const origin = activities[0].location;
          const destination = activities[activities.length - 1].location;
          const waypoints = activities.slice(1, -1).map((act) => ({
            location: act.location,
            stopover: true,
          }));

          directionsService.route(
            {
              origin: origin,
              destination: destination,
              waypoints: waypoints,
              optimizeWaypoints: false,
              travelMode: google.maps.TravelMode.DRIVING,
            },
            (result, status) => {
              if (status === "OK") {
                directionsRenderer.setDirections(result);
                addCustomMarkers(activities, dayIndex);
              } else {
                console.error(`第 ${dayIndex + 1} 天路線規劃失敗:`, status);
              }
            },
          );
        });

        loadAllTimelineActivities();
      }

      // 顯示單一天的行程
      function displayDay(dayIndex) {
        clearMapRoutes(); // 先清除舊路線
        const day = getActiveDays()[dayIndex];

        if (!day || !day.activities || day.activities.length < 2) {
          console.error("該日期沒有足夠的活動");
          return;
        }

        const { DirectionsService, DirectionsRenderer } = google.maps;

        const directionsService = new DirectionsService();
        const directionsRenderer = new DirectionsRenderer({
          map: map,
          suppressMarkers: true,
          polylineOptions: {
            strokeColor: getColorByDay(dayIndex),
            strokeWeight: 7,
            strokeOpacity: 0.9,
          },
        });

        currentRenderers.push(directionsRenderer); // 記錄下來以便日後清除

        const activities = day.activities;
        const origin = activities[0].location;
        const destination = activities[activities.length - 1].location;
        const waypoints = activities.slice(1, -1).map((act) => ({
          location: act.location,
          stopover: true,
        }));

        directionsService.route(
          {
            origin: origin,
            destination: destination,
            waypoints: waypoints,
            optimizeWaypoints: false,
            travelMode: google.maps.TravelMode.DRIVING,
          },
          (result, status) => {
            if (status === "OK") {
              directionsRenderer.setDirections(result);
              addCustomMarkers(activities, dayIndex);
              // 載入該天的時間線
              loadSingleDayTimeline(day, dayIndex);
              setTimeout(() => {
                map.panBy(0, 180);
              }, 150);
            } else {
              console.error(`路線規劃失敗 (Day ${dayIndex + 1})`, {
                status: status,
                origin: origin,
                destination: destination,
                waypoints: waypoints,
                activities: activities.map((a) => ({
                  name: a.place_name,
                  location: a.location,
                })),
              });
            }
          },
        );
      }

      // 切換日期
      function switchDay(dayIndex, clickedBtn) {
        if (isEditMode && currentDayIndex !== dayIndex) {
          if (currentDayIndex === -1) {
            saveAllDayOrder();
          } else {
            saveCurrentDayOrder(currentDayIndex);
          }
        }

        currentDayIndex = dayIndex;

        // 1. 獲取所有按鈕，並把所有按鈕的顏色清空（恢復成未選中的預設樣式）
        const allBtns = document.querySelectorAll("#dayButtonContainer button");
        allBtns.forEach((btn) => {
          btn.classList.remove("active");
          btn.style.backgroundColor = ""; // 清除背景色
          btn.style.color = ""; // 清除文字顏色
          btn.style.borderColor = ""; // 清除邊框顏色
        });

        // 2. 設定當前被點擊按鈕的專屬顏色
        clickedBtn.classList.add("active");
        const activeColor = getColorByDay(dayIndex);
        clickedBtn.style.backgroundColor = activeColor;
        clickedBtn.style.color = "#FFFFFF"; // 把文字變成白色，避免背景太深看不清楚文字
        clickedBtn.style.borderColor = activeColor;

        // 3. 判斷要顯示單天還是全部
        if (dayIndex === -1) {
          displayAllDays();
        } else {
          displayDay(dayIndex);
        }
      }
      async function initMap() {
        try {
          const response = await fetch(`${API_BASE}/api/itinerary`);

          if (!response.ok) {
            throw new Error(`itinerary API ${response.status}`);
          }

          const result = await response.json();
          allDays = result.data.days;

          // 計算所有景點的平均座標
          let totalLat = 0;
          let totalLng = 0;
          let pointCount = 0;

          allDays.forEach((day) => {
            day.activities.forEach((activity) => {
              if (
                activity.location &&
                activity.location.lat &&
                activity.location.lng
              ) {
                totalLat += activity.location.lat;
                totalLng += activity.location.lng;
                pointCount++;
              }
            });
          });

          const avgLat = pointCount > 0 ? totalLat / pointCount : 35.6762;
          const avgLng = pointCount > 0 ? totalLng / pointCount : 139.6503;

          const { Map } = await google.maps.importLibrary("maps");
          map = new Map(document.getElementById("map"), {
            zoom: 10,
            center: { lat: avgLat, lng: avgLng },
            mapId: "DEMO_MAP_ID",
          });

          map.addListener("click", () => {
            if (justClickedMarker) {
              justClickedMarker = false;
              return;
            }
            // 當點擊地圖時，檢查下邊欄是否展開，如果是就收起
            const sheet = document.getElementById("bottomSheet");
            if (sheet && sheet.classList.contains("expanded")) {
              closeSheet();
            }
            clearCurrentPopup();
          });

          createDayButtons();
          displayAllDays();
        } catch (error) {
          console.error("初始化地圖失敗：", error);
        }
      }

      fetch(`${API_BASE}/api/google-key`)
        .then((res) => res.json())
        .then((data) => {
          const script = document.createElement("script");
          script.src = `https://maps.googleapis.com/maps/api/js?key=${data.key}&callback=initMap&libraries=routes&loading=async`;
          script.async = true;
          document.head.appendChild(script);
        });
      const sidebar = document.getElementById("sidebar");
      const overlay = document.querySelector(".sidebar-overlay");
      const sheet = document.getElementById("bottomSheet");
      const fabGroup = document.getElementById("fabGroup");
      const mapContainer = document.getElementById("mapContainer");
      const dragHandle = document.getElementById("dragHandle");

      let isEditMode = false;
      let isChatMode = false;
      let originalTimelineHTML = "";
      let isDragChanged = false;
      let editedDays = null;

      const timelineView = document.getElementById("timelineView");
      const chatView = document.getElementById("chatView");
      const editFab = document.getElementById("editFab").querySelector("i");
      const robotFabIcon = document
        .getElementById("robotFab")
        .querySelector("i");

      // --- 行程搜尋相關變數 ---
      const spotSearchOverlay = document.getElementById("spotSearchOverlay");
      const spotSearchInput = document.getElementById("spotSearchInput");

      // 點擊搜尋框時重新顯示清單
      spotSearchInput.addEventListener("focus", function () {
        if (
          spotSearchState.isOpen &&
          Array.isArray(spotSearchState.results) &&
          spotSearchState.results.length > 0 &&
          spotSearchResults.innerHTML === ""
        ) {
          renderSpotSearchResults();
        }
      });
      const spotSearchResults = document.getElementById("spotSearchResults");

      const spotSearchState = {
        isOpen: false,
        results: [],
        selectedIndex: -1,
        requestId: 0,
      };

      function escapeHtml(text) {
        if (text === null || text === undefined) return "";
        return String(text)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      // 將 Google Places API 的地點物件轉換成統一的 { lat, lng } 格式
      function normalizePlaceLocation(place) {
        if (!place || !place.location) return null;

        const lat =
          typeof place.location.lat === "number"
            ? place.location.lat
            : typeof place.location.latitude === "number"
              ? place.location.latitude
              : null;

        const lng =
          typeof place.location.lng === "number"
            ? place.location.lng
            : typeof place.location.longitude === "number"
              ? place.location.longitude
              : null;

        if (lat === null || lng === null) return null;
        return { lat, lng };
      }

      function clearSpotPreview() {
        if (spotPreviewMarker) {
          spotPreviewMarker.setMap(null);
          spotPreviewMarker = null;
        }
      }

      function closeSpotPreviewInfo() {
        clearCurrentPopup();
        clearSpotPreview();
      }

      async function getBusinessInfo(spot) {
        if (!spot) {
          return {
            openingHoursText: "未提供",
            priceRangeText: "未提供",
          };
        }

        // 若先前已查過 business_info，優先使用快取結果，減少重複 API 請求。
        if (spot._businessInfo) {
          const openingHours = spot._businessInfo.opening_hours;
          const priceRange = spot._businessInfo.price_range;
          const openingHoursText =
            Array.isArray(openingHours) && openingHours.length > 0
              ? openingHours[0]
              : "未提供";
          const priceRangeText =
            priceRange && typeof priceRange === "object"
              ? `${priceRange?.startPrice?.currencyCode || ""} ${
                  priceRange?.startPrice?.units || ""
                }-${priceRange?.endPrice?.units || ""}`.trim()
              : "未提供";
          return { openingHoursText, priceRangeText };
        }

        try {
          let response;

          // 以 place_id 查詢 沒有 place_id 才使用名稱查詢
          if (spot.place_id) {
            response = await fetch(
              `${API_BASE}/api/maps/business_info/${encodeURIComponent(
                spot.place_id,
              )}`,
            );
          } else if (spot.name) {
            response = await fetch(`${API_BASE}/api/maps/business_info`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ name: spot.name }),
            });
          } else {
            return {
              openingHoursText: "未提供",
              priceRangeText: "未提供",
            };
          }

          // API失敗或回傳非成功格式的統一回傳預設值
          const payload = await response.json();
          if (!response.ok || !payload.success) {
            return {
              openingHoursText: "未提供",
              priceRangeText: "未提供",
            };
          }

          // 將回傳資料暫存到 spot，讓同一景點下次可直接使用。
          spot._businessInfo = payload?.data || {};
          const openingHours = spot._businessInfo.opening_hours;
          const priceRange = spot._businessInfo.price_range;

          const openingHoursText =
            Array.isArray(openingHours) && openingHours.length > 0
              ? openingHours[0]
              : "未提供";
          const priceRangeText =
            priceRange && typeof priceRange === "object"
              ? `${priceRange?.startPrice?.currencyCode || ""} ${
                  priceRange?.startPrice?.units || ""
                }-${priceRange?.endPrice?.units || ""}`.trim()
              : "未提供";

          return { openingHoursText, priceRangeText };
        } catch (error) {
          // 網路錯誤或解析錯誤時顯示
          return {
            openingHoursText: "未提供",
            priceRangeText: "未提供",
          };
        }
      }

      // 根據景點資料建立資訊視窗的 HTML 內容
      function buildSpotPreviewInfoHtml(
        spot,
        openingHoursText = "載入中...",
        priceRangeText = "載入中...",
      ) {
        const photoUrl =
          spot.photos && spot.photos[0] && spot.photos[0].photo_url
            ? spot.photos[0].photo_url
            : "";
        const name = escapeHtml(spot.name || "未命名地點");
        const address = escapeHtml(spot.address || "無地址資訊");
        const ratingText =
          typeof spot.rating === "number"
            ? `${spot.rating.toFixed(1)}${
                spot.user_rating_count ? ` (${spot.user_rating_count})` : ""
              }`
            : "未提供";
        const openingHoursDisplay = escapeHtml(openingHoursText);
        const priceRangeDisplay = escapeHtml(priceRangeText);

        return `
          <div class="spot-map-card">
            <div class="spot-map-card-head">
              <div class="spot-map-card-thumb ${photoUrl ? "has-photo" : ""}" ${
          photoUrl ? `style="background-image:url('${photoUrl}')"` : ""
        }>
                ${photoUrl ? "" : '<i class="far fa-image"></i>'}
              </div>
              <div class="spot-map-card-main">
                <div class="spot-map-card-title-row">
                  <div class="spot-map-card-title">${name}</div>
                  <button
                    type="button"
                    class="spot-map-close-btn"
                    aria-label="關閉景點資訊"
                    onclick="closeSpotPreviewInfo()"
                  >
                    <i class="fas fa-times"></i>
                  </button>
                </div>
                <div class="spot-map-card-address">${address}</div>
              </div>
            </div>
            <div class="spot-map-card-metrics">
              <div class="spot-map-chip"><i class="fas fa-star"></i> 評分 ${ratingText}</div>
              <div class="spot-map-chip"><i class="fas fa-clock"></i> ${openingHoursDisplay}</div>
              <div class="spot-map-chip"><i class="fas fa-wallet"></i> 價位：${priceRangeDisplay}</div>
            </div>
            <button type="button" class="spot-map-add-btn" onclick="addSpotToItinerary(selectedSpotForAdd, event)">
              <i class="fas fa-plus"></i> 加入行程
            </button>
          </div>
        `;
      }

      // 搜尋結果點擊後在地圖上顯示景點資訊的
      function openSpotInfoOnMap(
        spot,
        openingHoursText = "載入中...",
        priceRangeText = "載入中...",
      ) {
        if (!map || !spot) return;

        const location = normalizePlaceLocation(spot);
        if (!location) return;

        clearSpotPreview();
        clearCurrentPopup();

        // 新增一個 marker 來顯示目前選中的景點
        spotPreviewMarker = new google.maps.Marker({
          map,
          position: location,
          title: spot.name || "景點",
          animation: google.maps.Animation.DROP,
        });

        currentInfoWindow = new google.maps.InfoWindow({
          content: `<div class="spot-map-info-wrapper">${buildSpotPreviewInfoHtml(
            spot,
            openingHoursText,
            priceRangeText,
          )}</div>`,
          maxWidth: 360,
        });

        // 打開資訊視窗並把地圖中心移到這個景點
        currentInfoWindow.open({ map, anchor: spotPreviewMarker });
        map.panTo(location);
        if ((map.getZoom() || 0) < 15) {
          map.setZoom(15);
        }
      }

      // 在搜尋結果區顯示提示訊息（例如錯誤訊息或「沒有找到結果」的提示）
      function showSearchMessage(message) {
        spotSearchResults.innerHTML = `<div class="spot-search-message">${escapeHtml(message)}</div>`;
      }

      function buildActivityFromSpot(spot) {
        const location = normalizePlaceLocation(spot) || { lat: 0, lng: 0 };
        const types = Array.isArray(spot.types) ? spot.types : [];

        return {
          activityId: spot.place_id || `${spot.name || "spot"}-${Date.now()}`,
          place_name: spot.name || "未命名地點",
          time: "待安排",
          description: spot.address || "從搜尋新增的景點",
          cost: "",
          type: types[0] || "景點",
          address: spot.address || "",
          location,
          photos: spot.photos || [],
        };
      }

      // 把選中的景點加入行程
      async function addSpotToItinerary(spot, evt) {
        if (evt) evt.stopPropagation();
        if (!spot) return;

        // 看 currentDayIndex 決定要加到哪一天
        const targetDays = getActiveDays();
        if (!Array.isArray(targetDays) || !targetDays.length) return;

        const targetDayIndex =
          currentDayIndex >= 0 && currentDayIndex < targetDays.length
            ? currentDayIndex
            : 0;

        const targetDay = targetDays[targetDayIndex];
        if (!targetDay || !Array.isArray(targetDay.activities)) return;

        const newActivity = buildActivityFromSpot(spot);
        targetDay.activities.push(newActivity);

        if (isEditMode && editedDays) {
          isDragChanged = true;
          document.getElementById("dragConfirmBtn").classList.add("show");
        }

        if (currentDayIndex === -1) {
          displayAllDays();
        } else {
          displayDay(currentDayIndex);
        }

        openSheet();
        closeSpotSearchModal();
      }

      // --- SortableJS 設定 (拖拽功能) ---
      const timelineList = document.getElementById("timelineList");

      let sortable = new Sortable(timelineList, {
        animation: 150,
        disabled: true,
        delay: 200,
        delayOnTouchOnly: true,
        handle: ".timeline-item",
        ghostClass: "sortable-ghost",
        dragClass: "sortable-drag",
        filter: "[data-day-title],.delete-btn,.add-item-btn",
        scroll: true,
        scrollSpeed: 10,
        onEnd: function (evt) {
          // 拖曳放開後：保存當前天排序並顯示確認按鈕
          if (currentDayIndex === -1) {
            saveAllDayOrder();
          } else {
            saveCurrentDayOrder(currentDayIndex);
          }
          isDragChanged = true;
          document.getElementById("dragConfirmBtn").classList.add("show");
        },
      });

      // 新增確認按鈕的功能
      function confirmDrag() {
        // 這裡可以放打 API 給後端的程式碼
        console.log("新排序已確認，準備更新後端資料...");

        if (currentDayIndex === -1) {
          saveAllDayOrder();
        } else {
          saveCurrentDayOrder(currentDayIndex);
        }

        // 將編輯草稿寫回正式資料
        if (editedDays) {
          allDays = JSON.parse(JSON.stringify(editedDays));
          editedDays = null;
        }

        // 隱藏按鈕，禁止拖拽（完成一次批次確認）
        document.getElementById("dragConfirmBtn").classList.remove("show");
        sortable.option("disabled", true);
        isDragChanged = false;

        // 回到非編輯狀態，同步按鈕
        isEditMode = false;
        timelineView.classList.remove("editing");
        editFab.classList.remove("fa-times");
        editFab.classList.add("fa-pen");
      }

      // 初始化聊天
      function showGeneratedRawOutputInChat() {
        const raw = localStorage.getItem("last_itinerary_response");
        if (!raw) return;

        try {
          const payload = JSON.parse(raw);
          const rawOutput = payload?.data?.raw_output;

          if (!rawOutput) return;

          // 自動切到聊天視圖
          if (!isChatMode) {
            toggleChatMode();
          }

          // 顯示 raw_output（可讀格式）
          let displayText = rawOutput;
          try {
            const obj = JSON.parse(rawOutput);
            displayText = JSON.stringify(obj, null, 2);
          } catch (_) {}

          appendMsg(displayText, "bot");

          // 避免重整一直重複顯示
          localStorage.removeItem("last_itinerary_response");
        } catch (e) {
          console.error("讀取行程回應失敗:", e);
        }
      }

      // 初始化聊天（原本的測試訊息請移除）
      window.onload = function () {
        showGeneratedRawOutputInChat();
      };

      // 切換聊天模式
      function toggleChatMode() {
        isChatMode = !isChatMode;

        if (isChatMode) {
          // 進入聊天模式
          timelineView.classList.remove("active");
          chatView.classList.add("active");
          openSheet();
          syncSheetState("sheet-expanded");
          document.getElementById("editFab").style.display = "none";

          // 改變圖示：機器人 → 列表
          robotFabIcon.classList.remove("fa-robot");
          robotFabIcon.classList.add("fa-list-ul");

          setTimeout(() => document.getElementById("chatInput").focus(), 300);
        } else {
          // 回到行程表模式
          chatView.classList.remove("active");
          timelineView.classList.add("active");
          sheet.classList.remove("expanded", "half");
          syncSheetState("sheet-collapsed");
          document.getElementById("editFab").style.display = "flex";

          // 恢復圖示：列表 → 機器人
          robotFabIcon.classList.remove("fa-list-ul");
          robotFabIcon.classList.add("fa-robot");
        }
      }

      // 發送訊息
      function sendMessage() {
        const input = document.getElementById("chatInput");
        const text = input.value.trim();
        if (!text) return;

        appendMsg(text, "user");
        input.value = "";

        const loadingId = "loading-" + Date.now();
        document
          .getElementById("chatMessages")
          .insertAdjacentHTML(
            "beforeend",
            `<div class="typing" id="${loadingId}"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`,
          );
        scrollToBottom();

        setTimeout(() => {
          document.getElementById(loadingId).remove();

          setTimeout(() => {
            appendMsg("測試訊息", "bot");
            sheet.classList.remove("expanded");
            sheet.classList.add("half");
            fabGroup.classList.remove("horizontal");
            fabGroup.classList.add("half-mode");
          }, 1000);
        }, 1500);
      }

      function appendMsg(text, type) {
        const div = document.createElement("div");
        div.className = `chat-msg ${type}`;
        div.textContent = text;
        document.getElementById("chatMessages").appendChild(div);
        scrollToBottom();
      }

      function scrollToBottom() {
        const container = document.getElementById("chatMessages");
        container.scrollTop = container.scrollHeight;
      }

      // 編輯模式切換
      function getActiveDays() {
        return isEditMode && editedDays ? editedDays : allDays;
      }

      function saveCurrentDayOrder(dayIndex) {
        if (dayIndex < 0 || !editedDays || !editedDays[dayIndex]) return;

        const items = Array.from(
          document.querySelectorAll("#timelineList .timeline-item"),
        );
        const ids = items
          .map((item) => item.dataset.activityId)
          .filter((id) => id);

        if (!ids.length) return;

        const oldActivities = editedDays[dayIndex].activities;
        const newOrder = ids
          .map((id) =>
            oldActivities.find(
              (act) => act.activityId === id || act.place_name === id,
            ),
          )
          .filter(Boolean);

        if (newOrder.length === oldActivities.length) {
          editedDays[dayIndex].activities = newOrder;
        }
      }

      function saveAllDayOrder() {
        if (!editedDays) return;

        const daySections = [];
        let currentSection = null;

        document.querySelectorAll("#timelineList > *").forEach((node) => {
          if (node.matches("[data-day-title]")) {
            currentSection = { activityIds: [] };
            daySections.push(currentSection);
          } else if (
            node.classList &&
            node.classList.contains("timeline-item") &&
            currentSection
          ) {
            const activityId = node.dataset.activityId;
            if (activityId) {
              currentSection.activityIds.push(activityId);
            }
          }
        });

        if (!daySections.length) return;

        daySections.forEach((section, idx) => {
          const day = editedDays[idx];
          if (!day || !day.activities) return;

          const ordered = section.activityIds
            .map((id) =>
              day.activities.find(
                (act) => act.activityId === id || act.place_name === id,
              ),
            )
            .filter(Boolean);

          if (ordered.length === day.activities.length) {
            day.activities = ordered;
          }
        });
      }

      function toggleEditMode() {
        event.stopPropagation();

        if (!isEditMode) {
          // 進入編輯模式：建立一份可修改的草稿
          editedDays = JSON.parse(JSON.stringify(allDays));
          originalTimelineHTML = timelineList.innerHTML;
          isDragChanged = false;
          isEditMode = true;

          timelineView.classList.add("editing");
          editFab.classList.remove("fa-pen");
          editFab.classList.add("fa-times");
          openSheet();
          sortable.option("disabled", false);
          document.getElementById("dragConfirmBtn").classList.remove("show");
        } else {
          // 離開編輯模式（叉叉）：若尚未確認則還原草稿與 UI
          if (isDragChanged) {
            timelineList.innerHTML = originalTimelineHTML;
            isDragChanged = false;
          }
          editedDays = null;

          isEditMode = false;
          timelineView.classList.remove("editing");
          editFab.classList.remove("fa-times");
          editFab.classList.add("fa-pen");
          sortable.option("disabled", true);
          document.getElementById("dragConfirmBtn").classList.remove("show");

          // 恢復到確認前的資料（若有切換天數再回來）
          if (!editedDays) {
            // allDays 維持原狀
          }
          if (currentDayIndex === -1) {
            displayAllDays();
          } else {
            displayDay(currentDayIndex);
          }
        }
      }

      function deleteItem(btnElement) {
        const item = btnElement.closest(".timeline-item");
        if (item) {
          const activityId = item.dataset.activityId;
          item.style.opacity = "0";
          item.style.transform = "translateX(-20px)";
          setTimeout(() => {
            item.remove();
            if (isEditMode && editedDays && currentDayIndex !== -1) {
              editedDays[currentDayIndex].activities = editedDays[
                currentDayIndex
              ].activities.filter(
                (act) =>
                  act.activityId !== activityId &&
                  act.place_name !== activityId,
              );
              isDragChanged = true;
            }
          }, 300);
        }
      }

      // --- 行程搜尋相關功能 ---
      function openSpotSearchModal() {
        spotSearchState.isOpen = true;
        spotSearchState.results = [];
        spotSearchState.selectedIndex = -1;
        selectedSpotForAdd = null;

        spotSearchOverlay.classList.add("active");
        spotSearchOverlay.setAttribute("aria-hidden", "false");
        spotSearchResults.innerHTML = "";
        spotSearchInput.value = "";

        // 搜尋時先收起下方面板，避免遮住地圖
        sheet.classList.remove("expanded", "half");
        syncSheetState("sheet-collapsed");

        setTimeout(() => {
          spotSearchInput.focus(); // 動畫結束後才聚焦
        }, 50);
      }
      // 關閉搜尋視窗
      function closeSpotSearchModal() {
        spotSearchState.isOpen = false;
        spotSearchOverlay.classList.remove("active");
        spotSearchOverlay.setAttribute("aria-hidden", "true");
      }

      // 渲染搜尋結果列表
      function renderSpotSearchResults() {
        if (!spotSearchState.results.length) {
          spotSearchResults.innerHTML = "";
          return;
        }

        const html = spotSearchState.results
          .map((item, index) => {
            const isSelected = index === spotSearchState.selectedIndex;
            const photoUrl =
              item.photos && item.photos[0] && item.photos[0].photo_url
                ? item.photos[0].photo_url
                : "";
            return `
              <button
                type="button"
                class="spot-search-item ${isSelected ? "active" : ""}"
                onclick="selectSpotSearchResult(${index})"
              >
                <div class="spot-search-item-thumb ${photoUrl ? "has-photo" : ""}" ${photoUrl ? `style="background-image:url('${photoUrl}')"` : ""}>
                  ${photoUrl ? "" : '<i class="far fa-image"></i>'}
                </div>
                <div class="spot-search-item-body">
                  <div class="spot-search-item-main">${item.name || "未命名地點"}</div>
                  <div class="spot-search-item-sub">${item.address || "無地址資訊"}</div>
                </div>
              </button>
            `;
          })
          .join("");

        spotSearchResults.innerHTML = html;
      }

      async function selectSpotSearchResult(index) {
        spotSearchState.selectedIndex = index;
        renderSpotSearchResults();

        // 根據選中的搜尋結果在地圖上顯示資訊，並準備加入行程
        const selectedSpot = spotSearchState.results[index];
        if (!selectedSpot) return;

        selectedSpotForAdd = selectedSpot;
        // 只收起景點清單，不關閉搜尋框
        spotSearchResults.innerHTML = "";

        // 收起 bottom sheet
        sheet.classList.remove("expanded", "half");
        syncSheetState("sheet-collapsed");

        openSpotInfoOnMap(selectedSpot, "載入中...", "載入中...");

        const { openingHoursText, priceRangeText } = await getBusinessInfo(
          selectedSpot,
        );
        if (selectedSpotForAdd === selectedSpot) {
          openSpotInfoOnMap(selectedSpot, openingHoursText, priceRangeText);
        }
      }
      // 從行程活動中嘗試獲取一個有效的座標位置，作為搜尋的錨點
      function normalizeActivityLocation(location) {
        if (!location) return null;

        const lat =
          typeof location.lat === "number"
            ? location.lat
            : typeof location.latitude === "number"
              ? location.latitude
              : null;

        const lng =
          typeof location.lng === "number"
            ? location.lng
            : typeof location.longitude === "number"
              ? location.longitude
              : null;

        if (lat === null || lng === null) return null;
        return { latitude: lat, longitude: lng };
      }

      // 優先使用當前日期的最後一個活動位置，若無則從所有日期的最後活動往前找
      function getSearchAnchorLocation() {
        const getDayLastLocation = (day) => {
          if (
            !day ||
            !Array.isArray(day.activities) ||
            !day.activities.length
          ) {
            return null;
          }

          for (let i = day.activities.length - 1; i >= 0; i--) {
            const normalized = normalizeActivityLocation(
              day.activities[i].location,
            );
            if (normalized) return normalized;
          }
          return null;
        };

        if (currentDayIndex >= 0 && currentDayIndex < allDays.length) {
          const byCurrentDay = getDayLastLocation(allDays[currentDayIndex]);
          if (byCurrentDay) return byCurrentDay;
        }

        for (let i = allDays.length - 1; i >= 0; i--) {
          const byLastDay = getDayLastLocation(allDays[i]);
          if (byLastDay) return byLastDay;
        }

        return null;
      }

      // 執行景點搜尋
      async function performSpotSearch(
        keyword,
        reqId,
        showNoResultMessage = false,
      ) {
        try {
          const anchorLocation = getSearchAnchorLocation();
          let response, payload;

          if (anchorLocation) {
            response = await fetch(`${API_BASE}/api/maps/search_nearby`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                textQuery: keyword,
                location: anchorLocation,
                radius: 1500,
                languageCode: "zh-TW",
                maxResultCount: 8,
              }),
            });
          } else {
            response = await fetch(`${API_BASE}/api/maps/search`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                textQuery: keyword,
                languageCode: "zh-TW",
                maxResultCount: 10,
              }),
            });
          }

          payload = await response.json();

          if (reqId !== spotSearchState.requestId || !spotSearchState.isOpen) {
            return;
          }

          const places = payload?.data?.places || [];
          spotSearchState.results = places;
          spotSearchState.selectedIndex = -1;

          if (!response.ok || !payload.success) {
            showSearchMessage(payload.error || "搜尋失敗，請稍後再試");
            return;
          }

          if (!places.length) {
            if (showNoResultMessage) {
              showSearchMessage("找不到相關景點，請嘗試其他關鍵字");
            } else {
              spotSearchResults.innerHTML = "";
            }
            return;
          }

          renderSpotSearchResults();
        } catch (error) {
          if (reqId !== spotSearchState.requestId || !spotSearchState.isOpen) {
            return;
          }
          showSearchMessage("搜尋失敗，請檢查網路或稍後再試");
        }
      }

      function triggerSpotSearch(showNoResultMessage = false) {
        const keyword = spotSearchInput.value.trim();
        if (!keyword) {
          showSearchMessage("請先輸入關鍵字");
          return;
        }

        const anchorLocation = getSearchAnchorLocation();
        if (anchorLocation && map && typeof map.panTo === "function") {
          map.panTo({
            lat: anchorLocation.latitude,
            lng: anchorLocation.longitude,
          });
        }

        spotSearchState.requestId += 1;
        const currentReqId = spotSearchState.requestId;
        spotSearchResults.innerHTML = "";
        performSpotSearch(keyword, currentReqId, showNoResultMessage);
      }

      function onSpotSearchKeydown(e) {
        if (e.key === "Enter") {
          e.preventDefault();
          triggerSpotSearch(true);
          return;
        }

        if (e.key === "Escape") {
          closeSpotSearchModal();
        }
      }

      // 新增行程項目（打開搜尋視窗）
      function addItem() {
        openSpotSearchModal();
      }

      function addItem1() {
        // 防止未定義變數造成錯誤
        const activity = {
          place_name: "新增景點",
          time: "未定",
          description: "請點擊編輯此行程內容",
          cost: "",
        };
        const photoUrl = "";
        const isLast = true;

        const newItemHTML = `
        <div class="delete-btn" onclick="deleteItem(this)"><i class="fas fa-trash"></i></div>
        
        <div class="location-block">
          <div class="timeline-left">
            <div class="location-img" ${photoUrl ? (style = "background-image: url('${photoUrl}'); background-size: cover; background-position: center;") : ""}>
              <i class="far fa-image" ${photoUrl ? 'style="display: none;"' : ""}></i>
            </div>
          </div>
          <div class="timeline-right">
            <div class="timeline-title">
              ${activity.place_name}
              <span class="time-badge">${activity.time}</span>
            </div>
            <div class="timeline-desc">${activity.description}</div>
            ${activity.cost ? `<div class="activity-cost">💰 ${activity.cost}</div>` : ""}
          </div>
        </div>

        ${
          !isLast
            ? `
        <div class="transit-block">
          <div class="transit-line"></div>
          <div class="transit-data"><i class="fas fa-bus"></i> 預估交通時間...</div>
        </div>
        `
            : '<div style="height: 15px;"></div>'
        } 
      `;
        const div = document.createElement("div");
        div.className = "timeline-item";
        div.dataset.activityId =
          activity.activityId || activity.place_name || String(Date.now());
        div.innerHTML = newItemHTML;
        timelineList.appendChild(div);

        if (isEditMode && editedDays && currentDayIndex !== -1) {
          editedDays[currentDayIndex].activities.push({
            ...activity,
            activityId: div.dataset.activityId,
          });
          isDragChanged = true;
        }

        const addButton = document.querySelector(".add-item-btn");
        if (addButton) addButton.scrollIntoView({ behavior: "smooth" });
      }

      function toggleSidebar() {
        sidebar.classList.toggle("active");
        overlay.classList.toggle("active");
      }

      function toggleBookmark(iconElement) {
        event.stopPropagation();
        if (iconElement.classList.contains("fas")) {
          iconElement.classList.remove("fas");
          iconElement.classList.add("far");
        } else {
          iconElement.classList.remove("far");
          iconElement.classList.add("fas");
        }
      }

      function syncSheetState(state) {
        mapContainer.classList.remove(
          "sheet-expanded",
          "sheet-half",
          "sheet-collapsed",
        );
        mapContainer.classList.add(state);

        fabGroup.classList.remove("horizontal", "vertical");
        if (state === "sheet-expanded") {
          fabGroup.classList.add("horizontal");
        } else {
          fabGroup.classList.add("vertical");
        }
      }

      function openSheet() {
        sheet.classList.add("expanded");
        sheet.classList.remove("half");

        syncSheetState("sheet-expanded");
      }

      function closeSheet() {
        if (isEditMode) toggleEditMode();
        sheet.classList.remove("expanded", "half");

        syncSheetState("sheet-collapsed");
      }

      function toggleBottomSheet() {
        if (sheet.classList.contains("expanded")) {
          closeSheet();
        } else {
          openSheet();
        }
      }

      dragHandle.addEventListener("click", toggleBottomSheet);

      let startY = 0;
      const threshold = 50;
      function handleTouchStart(e) {
        startY = e.touches[0].clientY;
      }
      function handleTouchEnd(e) {
        let endY = e.changedTouches[0].clientY;
        let distance = startY - endY;
        if (distance > threshold) openSheet();
        else if (distance < -threshold) closeSheet();
      }

      dragHandle.addEventListener("touchstart", handleTouchStart, {
        passive: true,
      });
      dragHandle.addEventListener("touchend", handleTouchEnd);

      mapContainer.addEventListener("click", function (e) {
        if (
          !sheet.contains(e.target) &&
          !fabGroup.contains(e.target) &&
          sheet.classList.contains("expanded")
        ) {
          closeSheet();
        }
      });

      function downloadPDF() {
        alert("正在下載行程 PDF 檔案...");
      }

      document
        .getElementById("chatInput")
        .addEventListener("keypress", function (e) {
          if (e.key === "Enter") {
            e.preventDefault();
            sendMessage();
          }
        });

      function navigateToSetup(projectId, projectTitle) {
        if (projectId) {
          sessionStorage.setItem("currentProjectId", projectId);
          sessionStorage.setItem("currentProjectTitle", projectTitle || "");
        }
        sessionStorage.setItem("navigationType", "forward");
        window.location.href = "setup.html";
      }

      spotSearchOverlay.addEventListener("click", function (e) {
        if (e.target === spotSearchOverlay) {
          closeSpotSearchModal();
        }
      });
      
      spotSearchInput.addEventListener("keydown", onSpotSearchKeydown);

      // 處理鍵盤彈出時的視窗大小變化
      window.visualViewport.addEventListener("resize", function () {
        const inputBar = document.querySelector(".chat-input-bar");
        if (inputBar && isChatMode) {
          // 鍵盤彈出時，調整輸入框位置
          const keyboardHeight =
            window.innerHeight - window.visualViewport.height;
          inputBar.style.bottom = keyboardHeight + "px";
        }
      });

      // 鍵盤收起時恢復位置
      window.visualViewport.addEventListener("scroll", function () {
        const inputBar = document.querySelector(".chat-input-bar");
        if (inputBar && window.visualViewport.height === window.innerHeight) {
          inputBar.style.bottom = "0px";
        }
      });

      const userId = Number(localStorage.getItem("userId"));
      const token = localStorage.getItem("userToken");
      if (!userId || !token) window.location.href = "login.html";

      function renderProjects(projects) {
        const list = document.querySelector(".trip-list");
        if (!list) return console.error("trip-list 不存在");
        list.innerHTML = "";
        if (!Array.isArray(projects) || projects.length === 0) {
          list.innerHTML = "<div class='empty'>尚無行程</div>";
          return;
        }

        projects.forEach((project) => {
          const item = document.createElement("div");
          item.className = "trip-item";
          item.innerHTML = `
      <div class="trip-info">
        <i class="far fa-bookmark bookmark-icon"></i>
        <div class="trip-text">
          <h4>${project.title || "未命名行程"}</h4>
          <span>${(project.created_at || "").split("T")[0] || ""}</span>
        </div>
      </div>`;
          item.addEventListener("click", () => openProject(project));
          list.appendChild(item);
        });
      }

      async function createNewProject() {
        if (!userId) {
          alert("請先登入再新增行程");
          window.location.href = "login.html";
          return;
        }

        const title = window.prompt("請輸入新行程標題", "我的行程");
        if (!title || !title.trim()) return;

        try {
          const resp = await fetch(`${API_BASE}/api/travel/project`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({
              user_id: userId,
              title: title.trim(),
            }),
          });

          const result = await resp.json();
          if (resp.ok && result.code === 201) {
            const projectId = result.data.project_id;
            const projectTitle = title.trim();

            navigateToSetup(projectId, projectTitle);
          } else {
            alert(result.message || result.error || "新增失敗");
          }
        } catch (err) {
          console.error(err);
          alert("新增失敗，請檢查網路或後端");
        }
      }

      async function loadProjects() {
        if (!userId || !token) {
          console.log("userId/token 未設定，將導向 login");
          window.location.href = "login.html";
          return;
        }

        const res = await fetch(
          `${API_BASE}/api/travel/projects?user_id=${userId}`,
          {
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
          },
        );
        const body = await res.json();
        console.log("loadProjects", res.status, body);
        if (res.ok && body.code === 200) {
          renderProjects(body.data);
        } else {
          console.warn("loadProjects 錯誤", res.status, body);
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        loadProjects();
      });

      async function openProject(project) {
        const token = localStorage.getItem("userToken");
        const res = await fetch(
          `${API_BASE}/api/travel/itineraries/${project.project_id}`,
          {
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
          },
        );
        const body = await res.json();

        if (res.ok && body.code === 200 && body.data && body.data.length > 0) {
          // 有 itinerary，直接渲染
          renderItinerary(body.data);
        } else {
          // 沒 itinerary -> 轉 setup
          sessionStorage.setItem("currentProjectId", project.project_id);
          sessionStorage.setItem("currentProjectTitle", project.title);
          sessionStorage.setItem("navigationType", "forward");
          window.location.href = "setup.html";
        }
      }

      item.addEventListener("click", () => openProject(project));
    </script>
  </body>

<!doctype html>

  <head>
    <meta charset="UTF-8" />

      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"

    <title>飛遊 App Prototype</title>
    <!-- 轉場前置：把整頁推到畫面上方，避免閃出最終畫面。
         實際俯衝動畫由 flight-animation.js 的 flyInFromTop() 接手。 -->
    <script>
      if (sessionStorage.getItem("navigationType") === "planeLead") {
        var s = document.createElement("style");
        s.id = "planeLeadInit";
        s.textContent = "body{transform:translateY(-100%)}";
        document.documentElement.appendChild(s);
        // 轉場期間把根背景換成 setup 同款天空，露出區才不會是灰色
        var de = document.documentElement.style;
        de.backgroundColor = "#1a1a1a";
        de.backgroundImage =
          "linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5))," +
          "url('assets/background/setup_bg.svg')";
        de.backgroundSize = "cover";
        de.backgroundPosition = "center";
        de.backgroundRepeat = "no-repeat";
        de.backgroundAttachment = "fixed";
        // 保險：flight-animation.js 沒跑時 4s 自動還原，避免頁面卡在畫面外
        setTimeout(function () {
          var st = document.getElementById("planeLeadInit");
          if (st) {
            st.remove();
            var d = document.documentElement.style;
            d.background = "";
            document.body && (document.body.style.transform = "");
            sessionStorage.removeItem("navigationType");
          }
        }, 4000);
      }
    </script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/index.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      #map {
        height: 100%;
        width: 100%;

    </style>
  </head>

    <!-- 新行程建立彈窗 -->
    <div id="newTripModal" class="new-trip-modal" aria-hidden="true">
      <!-- 點外面會關閉彈窗 -->
      <div class="new-trip-modal-backdrop" onclick="closeNewTripModal()"></div>

      <!-- 彈窗主內容：標題 + 日期 + 操作按鈕 -->
      <form
        class="new-trip-modal-panel"
        id="newTripModalPanel"
        onsubmit="submitNewTripModal(event)"
      >
        <button
          type="button"
          class="new-trip-modal-close"
          onclick="closeNewTripModal()"
          aria-label="關閉"
        >
          <i class="fas fa-times"></i>
        </button>

        <div class="new-trip-modal-title">建立新行程</div>

        <!-- 行程標題 -->
        <label class="new-trip-modal-label" for="newTripTitleInput"
          >行程標題</label
        >
        <input
          id="newTripTitleInput"
          class="new-trip-modal-input"
          type="text"
          placeholder="請輸入新行程標題"
          autocomplete="off"
          maxlength="40"
          required
        />

        <!-- 開始日期 -->
        <label class="new-trip-modal-label" for="newTripStartDateInput"
          >開始日期</label
        >
        <input
          id="newTripStartDateInput"
          class="new-trip-modal-input new-trip-modal-date"
          type="date"
          required
        />

        <!-- 取消 / 建立 -->
        <div class="new-trip-modal-actions">
          <button
            type="button"
            class="new-trip-modal-button secondary"
            onclick="closeNewTripModal()"
          >
            取消
          </button>
          <button type="submit" class="new-trip-modal-button primary">
            建立行程
          </button>
        </div>
      </form>
    </div>

    <div class="map-container" id="mapContainer">
      <!-- <div class="map-pin pin-1"><i class="fas fa-map-marker-alt"></i></div>
      <div class="map-pin pin-2"><i class="fas fa-map-marker-alt"></i></div>
       -->
      <div id="map">
        <!-- 這裡會放置地圖 -->
      </div>

      <div class="fab-group" id="fabGroup">
        <div class="fab" onclick="toggleChatMode()" id="robotFab">
          <i class="fas fa-robot"></i>
        </div>
      </div>

      <div class="bottom-sheet" id="bottomSheet">
        <div class="sheet-handle-bar" id="dragHandle">
          <div class="sheet-handle"></div>
        </div>

        <div class="sheet-content" id="sheetContent">
          <!-- 聊天視圖 -->
          <div id="chatView" class="view-section">
            <div class="chat-header">
              <div class="chat-header-avatar"><i class="fas fa-robot"></i></div>
              <div class="chat-header-info">
                <div class="chat-header-name">兵繃</div>
                <div class="chat-header-status"><span class="chat-status-dot"></span>Online · AI 助手</div>
              </div>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-suggestions" id="chatSuggestions">
              <button
                type="button"
                class="chat-suggestion-chip"
                onclick="sendSuggestedQuestion('附近熱門景點', this)"
              >
                附近熱門景點
              </button>
              <button
                type="button"
                class="chat-suggestion-chip"
                onclick="sendSuggestedQuestion('調整行程', this)"
              >
                調整行程
              </button>
              <button
                type="button"
                class="chat-suggestion-chip"
                onclick="sendSuggestedQuestion('附近美食推薦', this)"
              >
                附近美食推薦
              </button>
            </div>
            <div class="chat-input-bar">
              <input
                type="text"
                class="chat-input-field"
                id="chatInput"
                placeholder="輸入內容..."
              />
              <button class="chat-send-btn" onclick="sendMessage()">
                <i class="fas fa-paper-plane"></i>
              </button>
            </div>
          </div>

          <!-- 原本的行程表視圖 -->
          <div id="timelineView" class="view-section active">
            <div id="timelineList">
              <!-- 行程項目會動態生成在這裡 -->
            </div>
            <div class="add-item-btn" onclick="addItem()">
              <i class="fas fa-plus"></i> 新增行程
            </div>
            <div style="height: 20px"></div>
            <div
              id="dragConfirmBtn"
              class="drag-confirm-btn"
              onclick="confirmDrag()"
            >
              <i class="fas fa-check"></i> 確認
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="spot-search-overlay" id="spotSearchOverlay" aria-hidden="true">
      <div class="spot-search-panel" role="dialog" aria-modal="true">
        <div class="spot-search-input-row">
          <div class="spot-search-bar" role="search">
            <button
              class="spot-search-close"
              type="button"
              onclick="closeSpotSearchModal()"
              aria-label="返回"
            >
              <i class="fas fa-arrow-left"></i>
            </button>
            <input
              id="spotSearchInput"
              class="spot-search-input"
              type="text"
              placeholder="輸入景點、地標或地址"
            />
          </div>
        </div>
        <div class="spot-search-results" id="spotSearchResults"></div>
      </div>
    </div>

    <!-- 交通方式選擇器 -->
    <div class="transit-overlay" id="transitOverlay" onclick="closeTransitModal()">
      <div class="transit-modal" onclick="event.stopPropagation()">
        <div class="transit-modal-header">
          <span class="transit-modal-title">選取交通方式</span>
          <button class="transit-modal-close" onclick="closeTransitModal()">✕</button>
        </div>

        <div class="transit-mode-item" id="tm_DRIVING" onclick="selectTransitMode('DRIVING')">
          <div class="tmode-icon"><i class="fas fa-car"></i></div>
          <div class="tmode-label">駕車</div>
          <div class="tmode-info" id="tmi_DRIVING"></div>
        </div>
        <div class="transit-mode-item" id="tm_TRANSIT" onclick="selectTransitMode('TRANSIT')">
          <div class="tmode-icon"><i class="fas fa-train"></i></div>
          <div class="tmode-label">搭乘大眾運輸</div>
          <div class="tmode-info" id="tmi_TRANSIT"></div>
        </div>
        <div class="transit-mode-item" id="tm_WALKING" onclick="selectTransitMode('WALKING')">
          <div class="tmode-icon"><i class="fas fa-walking"></i></div>
          <div class="tmode-label">步行</div>
          <div class="tmode-info" id="tmi_WALKING"></div>
        </div>
        <div class="transit-mode-item" id="tm_STRAIGHT" onclick="selectTransitMode('STRAIGHT')">
          <div class="tmode-icon"><i class="fas fa-ruler"></i></div>
          <div class="tmode-label">直線距離</div>
          <div class="tmode-info" id="tmi_STRAIGHT"></div>
        </div>

      </div>

    </header>

        <hr class="sidebar-divider" />

    <!-- 新行程建立彈窗 -->
    <div id="newTripModal" class="new-trip-modal" aria-hidden="true">
      <!-- 點外面會關閉彈窗 -->
      <div class="new-trip-modal-backdrop" onclick="closeNewTripModal()"></div>

      <!-- 彈窗主內容：標題 + 日期 + 操作按鈕 -->
      <form
        class="new-trip-modal-panel"
        id="newTripModalPanel"
        onsubmit="submitNewTripModal(event)"
      >
        <button
          type="button"
          class="new-trip-modal-close"
          onclick="closeNewTripModal()"
          aria-label="關閉"
        >
          <i class="fas fa-times"></i>
        </button>

        <div class="new-trip-modal-title">建立新行程</div>

        <!-- 行程標題 -->
        <label class="new-trip-modal-label" for="newTripTitleInput"
          >行程標題</label
        >
        <input
          id="newTripTitleInput"
          class="new-trip-modal-input"
          type="text"
          placeholder="請輸入新行程標題"
          autocomplete="off"
          maxlength="40"
          required
        />

        <!-- 開始日期 -->
        <label class="new-trip-modal-label" for="newTripStartDateInput"
          >開始日期</label
        >
        <input
          id="newTripStartDateInput"
          class="new-trip-modal-input new-trip-modal-date"
          type="date"
          required
        />

        <!-- 取消 / 建立 -->
        <div class="new-trip-modal-actions">
          <button
            type="button"
            class="new-trip-modal-button secondary"
            onclick="closeNewTripModal()"
          >
            取消
          </button>
          <button type="submit" class="new-trip-modal-button primary">
            建立行程
          </button>
        </div>
      </form>
    </div>

    <div class="map-container" id="mapContainer">
      <!-- <div class="map-pin pin-1"><i class="fas fa-map-marker-alt"></i></div>
      <div class="map-pin pin-2"><i class="fas fa-map-marker-alt"></i></div>
       -->
      <div id="map">
        <!-- 這裡會放置地圖 -->
      </div>

      <div id="customMapPopup" class="custom-map-popup">
        <div class="popup-content"></div>
        <button class="popup-close-btn" onclick="closeCustomMapPopup()">
          <i class="fas fa-times"></i>
        </button>
        <div class="popup-tip"></div>
      </div>

      <div class="fab-group" id="fabGroup">
        <div class="fab" onclick="toggleChatMode()" id="robotFab">
          <i class="fas fa-robot"></i>
        </div>
        <div class="fab" onclick="toggleEditMode()" id="editFab">
          <i class="fas fa-pen"></i>
        </div>
      </div>

      <div class="bottom-sheet" id="bottomSheet">
        <div class="sheet-handle-bar" id="dragHandle">
          <div class="sheet-handle"></div>
        </div>

        <div class="sheet-content" id="sheetContent">
          <!-- 聊天視圖 -->
          <div id="chatView" class="view-section">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-bar">
              <input
                type="text"
                class="chat-input-field"
                id="chatInput"
                placeholder="輸入需求..."
              />
              <button class="chat-send-btn" onclick="sendMessage()">
                <i class="fas fa-paper-plane"></i>
              </button>
            </div>
          </div>

          <!-- 原本的行程表視圖 -->
          <div id="timelineView" class="view-section active">
            <div id="timelineList">
              <!-- 行程項目會動態生成在這裡 -->
            </div>
            <div class="add-item-btn" onclick="addItem()">
              <i class="fas fa-plus"></i> 新增行程
            </div>
            <div style="height: 20px"></div>
            <div
              id="dragConfirmBtn"
              class="drag-confirm-btn"
              onclick="confirmDrag()"
            >
              <i class="fas fa-check"></i> 確認
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="spot-search-overlay" id="spotSearchOverlay" aria-hidden="true">
      <div class="spot-search-panel" role="dialog" aria-modal="true">
        <div class="spot-search-input-row">
          <button
            class="spot-search-close"
            type="button"
            onclick="closeSpotSearchModal()"
            aria-label="關閉搜尋"
          >
            <i class="fas fa-close"></i>
          </button>
          <input
            id="spotSearchInput"
            class="spot-search-input"
            type="text"
            placeholder="輸入景點、地標或地址"
          />
        </div>
        <div class="spot-search-results" id="spotSearchResults"></div>
      </div>
    </div>

    <div id="pdf-export-container"></div>

    <script src="js/auth.js"></script>

    <script src="js/timeline.js"></script>
    <script src="js/itinerary.js"></script>
    <script src="js/search.js"></script>
    <script src="js/edit.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>

  </body>

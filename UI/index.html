    <script>
      let map;
      let allDays = [];
      let currentDayIndex = -1;
      const API_BASE = "http://127.0.0.1:5001";
      let avgLat = 35.6762; 
      let avgLng = 139.6503; 

      // 新增：用來記錄目前畫在地圖上的所有路線，方便切換時清除
      let currentRenderers = [];
      let currentMarkers = [];
      let currentInfoWindow = null;
      let justClickedMarker = false;
      let spotPreviewMarker = null;
      let selectedSpotForAdd = null;


      // 根據日期索引獲取顏色
      function getColorByDay(dayIndex) {
        // 新增：如果是 -1 (代表「全部」按鈕)，給它一個專屬的深灰色
        if (dayIndex === -1) {
          return "#455A64";
        }
        const colors = [
          "#2962FF",
          "#34A853",
          "#EA4335",
          "#FBBC04",
          "#9C27B0",
          "#FFC0CB",
        ];
        return colors[dayIndex % colors.length];
      }

      // 創建日期按鈕
      function createDayButtons() {
        const timelineView = document.getElementById("timelineView");
        const oldContainer = document.getElementById("dayButtonContainer");
        if (oldContainer) oldContainer.remove();
        const buttonContainer = document.createElement("div");
        buttonContainer.id = "dayButtonContainer";

        const allBtn = document.createElement("button");
        allBtn.textContent = "全部";
        allBtn.classList.add("active"); // 預設為選中狀態

        // 新增：網頁一開始載入時，就幫「全部」按鈕上色
        const allColor = getColorByDay(-1);
        allBtn.style.backgroundColor = allColor;
        allBtn.style.color = "#FFFFFF";
        allBtn.style.borderColor = allColor;

        allBtn.onclick = () => switchDay(-1, allBtn);
        buttonContainer.appendChild(allBtn);
        // -------------------------
        allDays.forEach((day, index) => {
          const btn = document.createElement("button");
          btn.textContent = `第 ${day.day} 天`;
          btn.setAttribute("data-day-index", index);
          btn.onclick = () => switchDay(index, btn);
          buttonContainer.appendChild(btn);
        });

        console.log("AllDAYS", allDays);

        // 把按鈕加到時間線最上方
        timelineView.insertBefore(buttonContainer, timelineView.firstChild);
      }

      // 替換為以下這個 async 版本的 addCustomMarkers：
      async function addCustomMarkers(activities, dayIndex) {
        const { AdvancedMarkerElement } =
          await google.maps.importLibrary("marker");
        const color = getColorByDay(dayIndex);

        activities.forEach((activity, actIndex) => {
          // 製作地圖上的圓形小標記
          const markerDiv = document.createElement("div");
          markerDiv.classList.add("custom-marker");
          markerDiv.style.backgroundColor = color;
          markerDiv.innerHTML = `<span>${actIndex + 1}</span>`;

          const photoUrl =
            activity.photos && activity.photos[0]
              ? activity.photos[0].photo_url
              : "";

          const popupCardHTML = `
            <div class="popup-card-content">
              <div class="info-img-wrapper">
                ${
                  photoUrl
                    ? `<img src="${photoUrl}" class="info-img" alt="景點圖片">`
                    : `<div class="info-img" style="display:flex; align-items:center; justify-content:center; color:white;"><i class="far fa-image"></i></div>`
                }
              </div>
              <div class="info-content">
                <div class="info-header">
                  <div class="info-title">${activity.place_name || "未知景點"}</div>
                  <div class="info-time">${activity.time || "時間未定"}</div>
                </div>
                <div class="info-desc" style="-webkit-line-clamp: 1;">${activity.description || "暫無簡介資訊"}</div>
                <div class="info-meta">
                  <div class="info-meta-item"><i class="fas fa-clock"></i> ${activity.opening_hours || activity.time || "營業時間未定"}</div>
                  <div class="info-meta-item"><i class="fas fa-map-marker-alt"></i> ${activity.address || "尚未提供詳細地址"}</div>
                </div>
                ${activity.cost ? `<div class="info-cost">💰 ${activity.cost}</div>` : ""}
              </div>
            </div>
          `;

          const marker = new AdvancedMarkerElement({
            map: map,
            position: activity.location,
            content: markerDiv,
            title: activity.place_name,
          });

          marker.activityId =
            activity.activityId || activity.place_name || String(actIndex);
          currentMarkers.push(marker);

          marker.addListener("click", (e) => {
            justClickedMarker = true;

            if (currentInfoWindow) {
              currentInfoWindow.close();
            }

            currentInfoWindow = new google.maps.InfoWindow({
              content: `<div style="max-width: 280px;">${popupCardHTML}</div>`,
              maxWidth: 320,
            });

            currentInfoWindow.open({ map, anchor: marker });
          });
        });
      }

      function clearCurrentPopup() {
        if (currentInfoWindow) {
          currentInfoWindow.close();
          currentInfoWindow = null;
        }
      }

      function closeCustomMapPopup() {
        clearCurrentPopup();
      }

      function isValidRouteLocation(activity) {
        // 如果有 place_id，直接认为有效
        if (activity.place_id) {
          return true;
        }
        
        // 否则检查 location 中是否有坐标
        if (!activity.location) return false;
        const lat =
          typeof activity.location.lat === "number"
            ? activity.location.lat
            : typeof activity.location.latitude === "number"
              ? activity.location.latitude
              : null;
        const lng =
          typeof activity.location.lng === "number"
            ? activity.location.lng
            : typeof activity.location.longitude === "number"
              ? activity.location.longitude
              : null;
        if (lat === null || lng === null) return false;
        if (lat === 0 && lng === 0) return false;
        return true;
      }

      function clearMapRoutes() {
        currentRenderers.forEach((renderer) => renderer.setMap(null));
        currentRenderers = [];

        currentMarkers.forEach((marker) => (marker.map = null));
        currentMarkers = [];

        // 🔺 關鍵修復：切換天數時也清除彈出框
        clearCurrentPopup();
      }

      typeMessage(
        "好的，我已經理解您的需求。根據您的行程安排，我建議可以在大阪城附近增加大阪歷史博物館，這樣可以更深入了解大阪的歷史文化。另外，從道頓堀到心齋橋的路線非常順暢，中間還可以順道逛逛美國村，那裡有很多特色小店和咖啡廳喔！",
        "bot",
      );

      setTimeout(() => {
        sheet.classList.remove("expanded");
        sheet.classList.add("half");
        syncSheetState("sheet-half");
      }, 1000);

      // 逐字顯示訊息（打字機效果）
      function typeMessage(text, type, speed = 30) {
        const div = document.createElement("div");
        div.className = `chat-msg ${type}`;
        document.getElementById("chatMessages").appendChild(div);

        let index = 0;
        const interval = setInterval(() => {
          if (index < text.length) {
            div.textContent += text[index];
            index++;
            scrollToBottom();
          } else {
            clearInterval(interval);
          }
        }, speed);

        return div;
      }

      function appendMsg(text, type) {
        const div = document.createElement("div");
        div.className = `chat-msg ${type}`;
        div.textContent = text;
        document.getElementById("chatMessages").appendChild(div);
        scrollToBottom();
      }
      // 載入單天時間線
      function loadSingleDayTimeline(day, dayIndex) {
        const timelineList = document.getElementById("timelineList");

        // 移除舊的日期標題和活動
        const oldDayTitles = timelineList.querySelectorAll("[data-day-title]");
        const oldItems = timelineList.querySelectorAll(".timeline-item");

        oldDayTitles.forEach((el) => el.remove());
        oldItems.forEach((el) => el.remove());

        // 添加該天的日期標題
        const dayTitle = document.createElement("div");
        dayTitle.setAttribute("data-day-title", "true");
        dayTitle.textContent = `第 ${day.day} 天 - ${day.weekday}`;
        timelineList.appendChild(dayTitle);

        // 添加該天的所有活動
        day.activities.forEach((activity, actIndex) => {
          const isLast = actIndex === day.activities.length - 1;
          const photoUrl =
            activity.photos && activity.photos[0]
              ? activity.photos[0].photo_url
              : "";

          const newItemHTML = `
            <div class="delete-btn" onclick="deleteItem(this)"><i class="fas fa-trash"></i></div>
            
            <div class="location-block" onclick="focusMarker('${activity.activityId || activity.place_name || String(actIndex)}')">
              <div class="timeline-left">
                <div class="location-img" ${photoUrl ? `style="background-image: url('${photoUrl}'); background-size: cover; background-position: center;"` : ""}>
                  <i class="far fa-image" ${photoUrl ? 'style="display: none;"' : ""}></i>
                </div>
              </div>
              <div class="timeline-right">
                <div class="timeline-title">
                  ${actIndex + 1}. ${activity.place_name}
                  <span class="time-badge">${activity.time}</span>
                </div>
                <div class="timeline-desc">${activity.description}</div>
                ${activity.cost ? `<div class="activity-cost">💰 ${activity.cost}</div>` : ""}
              </div>
            </div>

            ${
              !isLast
                ? `
            <div class="transit-block">
              <div class="transit-line"></div>
              <div class="transit-data"><i class="fas fa-bus"></i> 預估交通時間...</div>
            </div>
            `
                : '<div style="height: 15px;"></div>'
            } 
          `;

          const div = document.createElement("div");
          div.className = "timeline-item";
          div.dataset.activityId =
            activity.activityId || activity.place_name || String(actIndex);
          div.innerHTML = newItemHTML;
          timelineList.appendChild(div);
        });
      }

      // 載入所有活動的時間線
      function loadAllTimelineActivities() {
        const timelineList = document.getElementById("timelineList");

        // 移除舊的日期標題和活動
        const oldDayTitles = timelineList.querySelectorAll("[data-day-title]");
        const oldItems = timelineList.querySelectorAll(".timeline-item");

        oldDayTitles.forEach((el) => el.remove());
        oldItems.forEach((el) => el.remove());

        allDays.forEach((day, dayIndex) => {
          const dayTitle = document.createElement("div");
          dayTitle.setAttribute("data-day-title", "true");
          dayTitle.textContent = `第 ${day.day} 天 - ${day.weekday}`;
          timelineList.appendChild(dayTitle);

          console.log(`正在載入第 ${day.day} 天的活動：`, day.activities);

          day.activities.forEach((activity, actIndex) => {
            const isLast = actIndex === day.activities.length - 1;
            const photoUrl =
              activity.photos && activity.photos[0]
                ? activity.photos[0].photo_url
                : "";

            const newItemHTML = `
            <div class="delete-btn" onclick="deleteItem(this)"><i class="fas fa-trash"></i></div>
            
            <div class="location-block" onclick="focusMarker('${activity.activityId || activity.place_name || String(actIndex)}')">
              <div class="timeline-left">
                <div class="location-img" ${photoUrl ? `style="background-image: url('${photoUrl}'); background-size: cover; background-position: center;"` : ""}>
                  <i class="far fa-image" ${photoUrl ? 'style="display: none;"' : ""}></i>
                </div>
              </div>
              <div class="timeline-right">
                <div class="timeline-title">
                  ${actIndex + 1}. ${activity.place_name}
                  <span class="time-badge">${activity.time}</span>
                </div>
                <div class="timeline-desc">${activity.description}</div>
                ${activity.cost ? `<div class="activity-cost">💰 ${activity.cost}</div>` : ""}
              </div>
            </div>

            ${
              !isLast
                ? `
            <div class="transit-block">
              <div class="transit-line"></div>
              <div class="transit-data"><i class="fas fa-bus"></i> 預估交通時間...</div>
            </div>
            `
                : '<div style="height: 15px;"></div>'
            } 
          `;

            const div = document.createElement("div");
            div.className = "timeline-item";
            div.dataset.activityId =
              activity.activityId || activity.place_name || String(actIndex);
            div.innerHTML = newItemHTML;
            timelineList.appendChild(div);
          });
        });
      }

      // Helper: 取得 Directions API 需要的地點格式
      function getLocationForDirections(activity) {
        if (activity && activity.place_id && typeof activity.place_id === "string" && activity.place_id.length > 0) {
          return { placeId: activity.place_id };
        }
        if (activity && activity.location && typeof activity.location.lat === "number" && typeof activity.location.lng === "number") {
          return { lat: activity.location.lat, lng: activity.location.lng };
        }
        return null;
      }

      // 顯示所有天的行程
      function displayAllDays() {
        clearMapRoutes(); // 先清除舊路線

        const { DirectionsService, DirectionsRenderer } = google.maps;


        getActiveDays().forEach((day, dayIndex) => {
          if (!day || !day.activities) {
            console.warn(`[ALL] 第 ${dayIndex + 1} 天資料異常`, day);
            return;
          }

          const activities = day.activities;
          const routeActivities = activities.filter((a) => isValidRouteLocation(a));

          if (activities.length < 2) {
            console.warn(`[ALL] 第 ${dayIndex + 1} 天活動數量不足`, activities);
            return;
          }
          if (routeActivities.length < 2) {
            console.warn(`[ALL] 第 ${dayIndex + 1} 天有效路線點不足`, {
              activities,
              routeActivities,
              判斷結果: activities.map(a => isValidRouteLocation(a)),
            });
            return;
          }

          const directionsService = new DirectionsService();
          const directionsRenderer = new DirectionsRenderer({
            map: map,
            suppressMarkers: true,
            preserveViewport: true,
            polylineOptions: {
              strokeColor: getColorByDay(dayIndex),
              strokeWeight: 7,
              strokeOpacity: 0.6,
            },
          });
          currentRenderers.push(directionsRenderer); // 記錄下來以便日後清除

          const origin = getLocationForDirections(routeActivities[0]);
          const destination = getLocationForDirections(routeActivities[routeActivities.length - 1]);
          if (!origin || !destination) {
            console.warn(
              `[ALL] 第 ${dayIndex + 1} 天缺少地點座標或 place_id，無法規劃路線`,
              { activities, routeActivities, origin, destination }
            );
            addCustomMarkers(routeActivities, dayIndex);
            return;
          }
          const waypoints = routeActivities.slice(1, -1).map((act) => ({
            location: getLocationForDirections(act),
            stopover: true,
          }));
          map.panTo({ lat: avgLat - 0.07, lng: avgLng });
          map.setZoom(12);
          directionsService.route(
            {
              origin: origin,
              destination: destination,
              waypoints: waypoints,
              optimizeWaypoints: true,
              travelMode: "WALKING",
            },
            (result, status) => {
              if (status === "OK") {
                directionsRenderer.setDirections(result);
                addCustomMarkers(routeActivities, dayIndex);
              } else {
                console.error(`[ALL] 路線規劃失敗 (Day ${dayIndex + 1})`, {
                  status: status,
                  origin: origin,
                  destination: destination,
                  waypoints: waypoints,
                  activities: routeActivities.map((a) => ({
                    name: a.place_name,
                    location: a.location,
                    place_id: a.place_id
                  })),
                });
                addCustomMarkers(routeActivities, dayIndex);
              }
            },
          );
        });

        loadAllTimelineActivities();
      }

      // 顯示單一天的行程
      function displayDay(dayIndex) {
        clearMapRoutes(); // 先清除舊路線
        const day = getActiveDays()[dayIndex];

        if (!day || !day.activities || day.activities.length < 2) {
          console.error("該日期沒有足夠的活動");
          return;
        }

        const { DirectionsService, DirectionsRenderer } = google.maps;

        const directionsService = new DirectionsService();
        const directionsRenderer = new DirectionsRenderer({
          map: map,
          suppressMarkers: true,
          polylineOptions: {
            strokeColor: getColorByDay(dayIndex),
            strokeWeight: 7,
            strokeOpacity: 0.9,
          },
        });

        currentRenderers.push(directionsRenderer); // 記錄下來以便日後清除

        const activities = day.activities;
        const routeActivities = activities.filter((a) => isValidRouteLocation(a));

        // 先更新該天時間線，避免路線失敗時仍顯示全部內容
        loadSingleDayTimeline(day, dayIndex);

        const origin = getLocationForDirections(routeActivities[0]);
        const destination = getLocationForDirections(routeActivities[routeActivities.length - 1]);
        if (!origin || !destination) {
          addCustomMarkers(routeActivities, dayIndex);
          return;
        }

        const waypoints = routeActivities.slice(1, -1).map((act) => ({
          location: getLocationForDirections(act),
          stopover: true,
        }));

        directionsService.route(
          {
            origin: origin,
            destination: destination,
            waypoints: waypoints,
            optimizeWaypoints: false,
            travelMode: "WALKING",
          },
          (result, status) => {
            if (status === "OK") {
              directionsRenderer.setDirections(result);
              addCustomMarkers(routeActivities, dayIndex);
              setTimeout(() => {
                map.panBy(0, 180);
              }, 150);
            } else {
              console.error(`路線規劃失敗 (Day ${dayIndex + 1})`, {
                status: status,
                origin: origin,
                destination: destination,
                waypoints: waypoints,
                activities: routeActivities.map((a) => ({
                  name: a.place_name,
                  location: a.location,
                  place_id: a.place_id
                })),
              });
              addCustomMarkers(routeActivities, dayIndex);
            }
          },
        );
      }

      // 第一階段：先加載坐標信息（供給 localStorage 的 generatedItinerary）

      function escapeHtml(text) {
        if (text === null || text === undefined) return "";
        return String(text)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      // 將 Google Places API 的地點物件轉換成統一的 { lat, lng } 格式
      function normalizePlaceLocation(place) {
        if (!place || !place.location) return null;

        const lat =
          typeof place.location.lat === "number"
            ? place.location.lat
            : typeof place.location.latitude === "number"
              ? place.location.latitude
              : null;

        const lng =
          typeof place.location.lng === "number"
            ? place.location.lng
            : typeof place.location.longitude === "number"
              ? place.location.longitude
              : null;

        if (lat === null || lng === null) return null;
        return { lat, lng };
      }

      async function getBusinessInfo(spot) {
        if (!spot) {
          return {
            openingHoursText: "未提供",
            priceRangeText: "未提供",
          };
        }

        // 若先前已查過 business_info，優先使用快取結果，減少重複 API 請求。
        if (spot._businessInfo) {
          const openingHours = spot._businessInfo.opening_hours;
          const priceRange = spot._businessInfo.price_range;
          const openingHoursText =
            Array.isArray(openingHours) && openingHours.length > 0
              ? openingHours[0]
              : "未提供";
          const priceRangeText =
            priceRange && typeof priceRange === "object"
              ? `${priceRange?.startPrice?.currencyCode || ""} ${
                  priceRange?.startPrice?.units || ""
                }-${priceRange?.endPrice?.units || ""}`.trim()
              : "未提供";
          return { openingHoursText, priceRangeText };
        }

        try {
          let response;

          // 以 place_id 查詢 沒有 place_id 才使用名稱查詢
          if (spot.place_id) {
            response = await fetch(
              `${API_BASE}/api/maps/business_info/${encodeURIComponent(
                spot.place_id,
              )}`,
            );
          } else if (spot.name) {
            response = await fetch(`${API_BASE}/api/maps/business_info`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ name: spot.name }),
            });
          } else {
            return {
              openingHoursText: "未提供",
              priceRangeText: "未提供",
            };
          }

          // API失敗或回傳非成功格式的統一回傳預設值
          const payload = await response.json();
          if (!response.ok || !payload.success) {
            return {
              openingHoursText: "未提供",
              priceRangeText: "未提供",
            };
          }

          // 將回傳資料暫存到 spot，讓同一景點下次可直接使用。
          spot._businessInfo = payload?.data || {};
          const openingHours = spot._businessInfo.opening_hours;
          const priceRange = spot._businessInfo.price_range;

          const openingHoursText =
            Array.isArray(openingHours) && openingHours.length > 0
              ? openingHours[0]
              : "未提供";
          const priceRangeText =
            priceRange && typeof priceRange === "object"
              ? `${priceRange?.startPrice?.currencyCode || ""} ${
                  priceRange?.startPrice?.units || ""
                }-${priceRange?.endPrice?.units || ""}`.trim()
              : "未提供";

          return { openingHoursText, priceRangeText };
        } catch (error) {
          // 網路錯誤或解析錯誤時顯示
          return {
            openingHoursText: "未提供",
            priceRangeText: "未提供",
          };
        }
      }

      // 通過Gemini補充詳細信息
      async function getDetailedItineraryFromDb(itineraryId) {
        try {
          const token = localStorage.getItem("userToken");
          const projectId = Number(
            sessionStorage.getItem("currentProjectId") ||
              localStorage.getItem("currentProjectId") ||
              0,
          );

          if (!token || !projectId || !itineraryId) return null;

          const res = await fetch(
            `${API_BASE}/api/travel/itineraries/${projectId}`,
            {
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${token}`,
              },
            },
          );
          const body = await res.json().catch(() => ({}));
          if (redirectToLoginIfUnauthorized(res.status, body)) return null;
          if (!res.ok) return null;
          if (body.code !== 200 || !Array.isArray(body.data)) return null;

          const row = body.data.find(
            (item) => Number(item.itinerary_id) === Number(itineraryId),
          );
          const detailed = row?.detailed_itinerary;

          if (
            detailed &&
            typeof detailed === "object" &&
            Object.keys(detailed).length > 0
          ) {
            return detailed;
          }

          return null;
        } catch (e) {
          console.warn("查詢 DB detailed_itinerary 失敗:", e);
          return null;
        }
      }

      async function generateDetailedItinerary() {
        try {
          console.log("第二步：調用 Gemini 補充詳細信息");

          // 從 localStorage 讀取坐標數據
          const dataLatLng = localStorage.getItem("data_latlng");
          if (!dataLatLng) {
            console.warn("找不到坐標數據");
            return false;
          }
          const tripSetup =
            localStorage.getItem("tripSetup") ||
            localStorage.getItem("trip_setup");
          const generatedItinerary = localStorage.getItem("generatedItinerary");
          const itineraryInfo = generatedItinerary
            ? JSON.parse(generatedItinerary)
            : null;
          const itineraryId =
            itineraryInfo?.itinerary_id ||
            itineraryInfo?.id ||
            Number(localStorage.getItem("currentItineraryId")) ||
            null;

          // 先查 DB：若已有 detailed_itinerary，就不要重送 /api/itinerary/detail
          const dbDetailed = await getDetailedItineraryFromDb(itineraryId);
          if (dbDetailed) {
            console.log("✓ DB 已有 detailed_itinerary，跳過重新生成");
            localStorage.setItem(
              "detailed_itinerary",
              JSON.stringify(dbDetailed),
            );
            return dbDetailed;
          }

          // 合併坐標數據和旅行配置
          const payload = {
            data_latlng: JSON.parse(dataLatLng),
            trip_setup: tripSetup ? JSON.parse(tripSetup) : {},
            itinerary_id: itineraryId,
          };

          // 調用後端端點來生成詳細行程
          const response = await fetch(`${API_BASE}/api/itinerary/detail`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload),
          });

          if (!response.ok) {
            throw new Error(`API 呼叫失敗 ${response.status}`);
          }

          const result = await response.json();

          if (result.code !== 200) {
            throw new Error(result.error || "生成詳細行程失敗");

          console.log("✓ 詳細行程已生成");

          // 存儲原始詳細行程

            "detailed_itinerary",

      // 補充圖片信息
      async function enrichWithPictureInfo(detailedData) {
        try {
          console.log("第三步：調用 /api/itinerary 補充圖片信息");

          const itineraryId =
            Number(localStorage.getItem("currentItineraryId")) ||
            Number(
              (() => {
                try {
                  const raw = localStorage.getItem("generatedItinerary");
                  if (!raw) return 0;
                  const parsed = JSON.parse(raw);
                  return parsed?.itinerary_id || parsed?.id || 0;
                } catch (_) {
                  return 0;
                }
              })(),
            ) ||
            null;

          const daysSource =
            detailedData?.parsed?.days || detailedData?.days || [];
          if (!Array.isArray(daysSource) || daysSource.length === 0) {
            console.warn("沒有可補圖的 days 資料");
            return false;
          }

          // 以目前 allDays 的座標回填到 detailed days，避免補圖後丟失地圖座標
          const daysWithLocation = daysSource.map((day, dayIndex) => {
            const currentDay = allDays.find(
              (d, idx) =>
                Number(d?.day) === Number(day?.day) || idx === dayIndex,
            );
            const currentActivities = Array.isArray(currentDay?.activities)
              ? currentDay.activities
              : [];

            const list = day.location || day.activities || [];
            const normalizedList = list.map((item, itemIndex) => {
              let matched = currentActivities.find(
                (a) => a?.place_name === item?.place_name,
              );
              if (!matched) matched = currentActivities[itemIndex];

              return {
                ...item,
                location: item.location || matched?.location || null,
              };
            });

            if (Array.isArray(day.location)) {
              return { ...day, location: normalizedList };
            }
            return { ...day, activities: normalizedList };
          });

          // 先POST保存到後端
          const response = await fetch(`${API_BASE}/api/itinerary`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              days: daysWithLocation,
              itinerary_id: itineraryId,
            }),
          });
          if (!response.ok) {
            throw new Error(`POST 失敗 ${response.status}`);
          }

          const result = await response.json();
          if (result.code !== 200 || !Array.isArray(result?.data?.days)) {
            throw new Error(result.error || "圖片補充回傳格式錯誤");
          }

          console.log("✓ 圖片信息已補充");

          // 轉換為 allDays 格式並更新畫面
          allDays = convertToAllDaysFormat(result.data.days);
          createDayButtons();
          if (currentDayIndex === -1) {
            displayAllDays();
          } else {
            displayDay(currentDayIndex);
          }

          return true;
        } catch (error) {
          console.error("補充圖片信息失敗：", error);
          return false;
        }
      }

      // 轉換為 allDays 期望的格式
      function convertToAllDaysFormat(days) {
        if (!days) return [];

        return days.map((day) => ({
          day: day.day,
          weekday: day.weekday,
          activities: (day.location || day.activities || []).map((item) => ({
            time: item.time,
            place_name: item.place_name,
            description: item.description || "",
            type: item.type || "景點",
            cost: item.cost || "未知",
            location: item.location || null,
            photos: item.photos,
            rating: item.rating,
            address: item.address,
            phone: item.phone,
          })),
        }));
      }

      function normalizeItineraryRowToAllDays(item) {
        if (!item || typeof item !== "object") return [];

        const rawLatLng =
          item?.data_latlng?.data && Array.isArray(item.data_latlng.data)
            ? item.data_latlng.data
            : Array.isArray(item?.data_latlng)
              ? item.data_latlng
              : [];

        const mergeDaysWithLatLng = (daysSource) => {
          const days = convertToAllDaysFormat(daysSource);
          if (!Array.isArray(days) || !days.length) return [];

          if (!rawLatLng.length) return days;

          return days.map((day, dayIndex) => {
            const dayLatLng =
              rawLatLng.find((d) => Number(d?.day) === Number(day?.day)) ||
              rawLatLng[dayIndex];
            const locations = Array.isArray(dayLatLng?.locations)
              ? dayLatLng.locations
              : [];

            return {
              ...day,
              activities: (day.activities || []).map((activity, actIndex) => {
                const hasValidLocation =
                  activity?.location &&
                  typeof activity.location.lat === "number" &&
                  typeof activity.location.lng === "number" &&
                  !(activity.location.lat === 0 && activity.location.lng === 0);

                if (hasValidLocation) return activity;

                let matched = locations.find(
                  (loc) => loc?.location_name === activity?.place_name,
                );
                if (!matched) matched = locations[actIndex];

                if (!matched?.location) return activity;

                return {
                  ...activity,
                  location: {
                    lat:
                      typeof matched.location.latitude === "number"
                        ? matched.location.latitude
                        : null,
                    lng:
                      typeof matched.location.longitude === "number"
                        ? matched.location.longitude
                        : null,
                  },
                };
              }),
            };
          });
        };

        const fromDetailedParsed = item?.detailed_itinerary?.parsed?.days;
        if (
          Array.isArray(fromDetailedParsed) &&
          fromDetailedParsed.length > 0
        ) {
          return mergeDaysWithLatLng(fromDetailedParsed);
        }

        const fromDetailedDays = item?.detailed_itinerary?.days;
        if (Array.isArray(fromDetailedDays) && fromDetailedDays.length > 0) {
          return mergeDaysWithLatLng(fromDetailedDays);
        }

        const fromDataJson = item?.data_json?.days;
        if (Array.isArray(fromDataJson) && fromDataJson.length > 0) {
          return mergeDaysWithLatLng(fromDataJson);
        }

        if (rawLatLng.length > 0) {
          return rawLatLng.map((dayObj) => ({
            day: dayObj.day,
            weekday: dayObj.weekday || `第${dayObj.day}天`,
            activities: (dayObj.locations || []).map((loc) => ({
              place_name: loc.location_name,
              location: {
                lat:
                  typeof loc?.location?.latitude === "number"
                    ? loc.location.latitude
                    : null,
                lng:
                  typeof loc?.location?.longitude === "number"
                    ? loc.location.longitude
                    : null,
              },
              time: "",
              description: "",
              type: "",
              cost: "",
            })),
          }));
        }

        return [];
      }

      function saveCurrentDayOrder(dayIndex) {
        if (dayIndex < 0 || !editedDays || !editedDays[dayIndex]) return;

        const items = Array.from(
          document.querySelectorAll("#timelineList .timeline-item"),
        );
        const ids = items
          .map((item) => item.dataset.activityId)
          .filter((id) => id);

        if (!ids.length) return;

        const oldActivities = editedDays[dayIndex].activities;
        const newOrder = ids
          .map((id) =>
            oldActivities.find(
              (act) => act.activityId === id || act.place_name === id,
            ),
          )
          .filter(Boolean);

        if (newOrder.length === oldActivities.length) {
          editedDays[dayIndex].activities = newOrder;
        }
      }

      function saveAllDayOrder() {
        if (!editedDays) return;

        const daySections = [];
        let currentSection = null;

        document.querySelectorAll("#timelineList > *").forEach((node) => {
          if (node.matches("[data-day-title]")) {
            currentSection = { activityIds: [] };
            daySections.push(currentSection);
          } else if (
            node.classList &&
            node.classList.contains("timeline-item") &&
            currentSection
          ) {
            const activityId = node.dataset.activityId;
            if (activityId) {
              currentSection.activityIds.push(activityId);
            }
          }
        });

        if (!daySections.length) return;

        daySections.forEach((section, idx) => {
          const day = editedDays[idx];
          if (!day || !day.activities) return;

          const ordered = section.activityIds
            .map((id) =>
              day.activities.find(
                (act) => act.activityId === id || act.place_name === id,
              ),
            )
            .filter(Boolean);

          if (ordered.length === day.activities.length) {
            day.activities = ordered;
          }
        });
      }

      // 從行程活動中嘗試獲取一個有效的座標位置，作為搜尋的錨點
      function normalizeActivityLocation(location) {
        if (!location) return null;

        const lat =
          typeof location.lat === "number"
            ? location.lat
            : typeof location.latitude === "number"
              ? location.latitude
              : null;

        const lng =
          typeof location.lng === "number"
            ? location.lng
            : typeof location.longitude === "number"
              ? location.longitude
              : null;

        if (lat === null || lng === null) return null;
        return { latitude: lat, longitude: lng };
      }

      // 優先使用當前日期的最後一個活動位置，若無則從所有日期的最後活動往前找
      function getSearchAnchorLocation() {
        const getDayLastLocation = (day) => {
          if (
            !day ||
            !Array.isArray(day.activities) ||
            !day.activities.length
          ) {
            return null;
          }

          for (let i = day.activities.length - 1; i >= 0; i--) {
            const normalized = normalizeActivityLocation(
              day.activities[i].location,
            );
            if (normalized) return normalized;
          }
          return null;
        };

        if (currentDayIndex >= 0 && currentDayIndex < allDays.length) {
          const byCurrentDay = getDayLastLocation(allDays[currentDayIndex]);
          if (byCurrentDay) return byCurrentDay;
        }

        for (let i = allDays.length - 1; i >= 0; i--) {
          const byLastDay = getDayLastLocation(allDays[i]);
          if (byLastDay) return byLastDay;
        }

        return null;
      }

      // 執行景點搜尋
      async function performSpotSearch(
        keyword,
        reqId,
        showNoResultMessage = false,
      ) {
        try {
          const anchorLocation = getSearchAnchorLocation();
          let response, payload;

          if (anchorLocation) {
            response = await fetch(`${API_BASE}/api/maps/search_nearby`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${token}`,
              },
              body: JSON.stringify({
                textQuery: keyword,
                location: anchorLocation,
                radius: 1500,
                languageCode: "zh-TW",
                maxResultCount: 8,
              }),
            });
          } else {
            response = await fetch(`${API_BASE}/api/maps/search`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                textQuery: keyword,
                languageCode: "zh-TW",
                maxResultCount: 10,
              }),
            });
          }

          payload = await response.json();

          if (reqId !== spotSearchState.requestId || !spotSearchState.isOpen) {
            return;
          }

          const places = payload?.data?.places || [];
          spotSearchState.results = places;
          spotSearchState.selectedIndex = -1;

          if (!response.ok || !payload.success) {
            showSearchMessage(payload.error || "搜尋失敗，請稍後再試");
            return;
          }

          if (!places.length) {
            if (showNoResultMessage) {
              showSearchMessage("找不到相關景點，請嘗試其他關鍵字");
            } else {
              spotSearchResults.innerHTML = "";
            }
            return;
          }

          renderSpotSearchResults();
        } catch (error) {
          if (reqId !== spotSearchState.requestId || !spotSearchState.isOpen) {
            return;
          }
          showSearchMessage("搜尋失敗，請檢查網路或稍後再試");
        }
      }

      function triggerSpotSearch(showNoResultMessage = false) {
        const keyword = spotSearchInput.value.trim();
        if (!keyword) {
          showSearchMessage("請先輸入關鍵字");
          return;

        const anchorLocation = getSearchAnchorLocation();
        if (anchorLocation && map && typeof map.panTo === "function") {
          map.panTo({
            lat: anchorLocation.latitude,
            lng: anchorLocation.longitude,
          });
        }

        spotSearchState.requestId += 1;
        const currentReqId = spotSearchState.requestId;
        spotSearchResults.innerHTML = "";
        performSpotSearch(keyword, currentReqId, showNoResultMessage);
      }

        if (state === "sheet-expanded") {
          fabGroup.classList.add("horizontal");
        } else {
          fabGroup.classList.add("vertical");
        }
      }

      function openSheet() {
        sheet.classList.add("expanded");
        sheet.classList.remove("half");

        syncSheetState("sheet-expanded");
      }

      function closeSheet() {
        if (isEditMode) toggleEditMode();
        sheet.classList.remove("expanded", "half");

        syncSheetState("sheet-collapsed");
      }

      function toggleBottomSheet() {
        if (sheet.classList.contains("expanded")) {
          closeSheet();
        } else {
          openSheet();
        }
      }

      dragHandle.addEventListener("click", toggleBottomSheet);

      let startY = 0;
      const threshold = 50;
      function handleTouchStart(e) {
        startY = e.touches[0].clientY;
      }
      function handleTouchEnd(e) {
        let endY = e.changedTouches[0].clientY;
        let distance = startY - endY;
        if (distance > threshold) openSheet();
        else if (distance < -threshold) closeSheet();
      }

      dragHandle.addEventListener("touchstart", handleTouchStart, {
        passive: true,
      });
      dragHandle.addEventListener("touchend", handleTouchEnd);

      mapContainer.addEventListener("click", function (e) {
        if (
          !sheet.contains(e.target) &&
          !fabGroup.contains(e.target) &&
          sheet.classList.contains("expanded")
        ) {
          closeSheet();
        }
      });

      async function downloadPDF() {
        if (!allDays || allDays.length === 0) {
          alert("目前沒有行程資料可以下載喔！");
          return;
        }

        const loadingOverlay = document.createElement("div");
        loadingOverlay.innerHTML = `
          <div style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.75); z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; font-family: 'Noto Serif TC', sans-serif;">
            <i class="fas fa-spinner fa-spin" style="font-size: 50px; margin-bottom: 20px; color: #D4C9A8;"></i>
            <div style="font-size: 18px; letter-spacing: 2px;">正在為您生成精美行程 PDF，請稍候...</div>
          </div>
        `;
        document.body.appendChild(loadingOverlay);

        // 💡 重要：稍微等待 100 毫秒，讓瀏覽器有時間把 Loading 畫面顯示出來，再開始轉檔
        await new Promise((resolve) => setTimeout(resolve, 100));

        const sidebarColors = [
          "#507A8A",
          "#688B58",
          "#B85438",
          "#A47E4A",
          "#513653",
        ];

        // 1. 建立純 HTML 字串
        let htmlContent = `
          <div style="background-color: #FAF8F5; width: 800px; font-family: 'Noto Serif TC', serif; color: #333;">
            <style>
              /* 💡 修正 1：將高度從 1131 改為 1120，並移除 page-break-after，避免溢出產生白紙 */
              .pdf-cover {
                width: 800px; height: 1130px;
                background-color: #2D2722;
                background-image: linear-gradient(135deg, #1A1513, #2D2722);
                color: #FFFFFF;
                display: flex; flex-direction: column; justify-content: center; align-items: center;
              }
              .pdf-cover h1 { font-size: 56px; letter-spacing: 4px; margin-bottom: 20px; color: #FFFFFF;}
              .pdf-cover p { font-size: 18px; color: #D4C9A8; letter-spacing: 2px; }
              
              .pdf-day-page {
                display: flex; width: 800px; min-height: 1120px; /* 這裡也改成 1120px */
                background-color: #FAF8F5;
              }
              
              /* ... 保留其他原本的樣式 ... */
              .pdf-sidebar { width: 140px; padding-top: 60px; text-align: center; color: #FFFFFF; flex-shrink: 0; }
              .pdf-sidebar .day-label { font-size: 14px; letter-spacing: 2px; opacity: 0.8; }
              .pdf-sidebar .day-num { font-size: 64px; font-weight: 700; line-height: 1; margin: 10px 0; }
              .pdf-sidebar .day-date { font-size: 14px; opacity: 0.8; }
              .pdf-content { flex-grow: 1; padding: 60px 50px; }
              .pdf-day-title { font-size: 24px; font-weight: 700; border-bottom: 1px solid #E0D8C8; padding-bottom: 20px; margin-bottom: 40px; }
              .pdf-item { display: flex; margin-bottom: 30px; }
              .pdf-item-time { width: 70px; font-size: 16px; color: #888; font-style: italic; flex-shrink: 0; }
              .pdf-item-detail { flex-grow: 1; }
              .pdf-item-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
              .pdf-item-tag { font-size: 10px; background-color: #EAE3D1; color: #665A48; padding: 2px 8px; border-radius: 4px; }
              .pdf-item-desc { font-size: 15px; color: #666; line-height: 1.6; }
              .pdf-transit { margin: 15px 0 15px 70px; padding-left: 20px; border-left: 1px dashed #CCC; font-size: 14px; color: #A09481; }
              .pdf-transit-badge { background-color: #F4EFEB; padding: 4px 12px; border-radius: 20px; display: inline-block; }
            </style>

            <div class="pdf-cover">
              <p style="margin-bottom: 10px;">JAPAN TRAVEL ITINERARY</p>
              <h1>日本九州之旅</h1>
              <p>${allDays.length} 天深度遊</p>
            </div>
        `;

        // 2. 塞入景點資料
        allDays.forEach((day, dayIndex) => {
          const bgColor = sidebarColors[dayIndex % sidebarColors.length];
          const topPlaces =
            day.activities && day.activities.length > 0
              ? day.activities
                  .slice(0, 3)
                  .map((a) => a.place_name)
                  .join("・")
              : "自由活動";

          let activitiesHtml = "";
          if (day.activities) {
            day.activities.forEach((act, actIndex) => {
              const isLast = actIndex === day.activities.length - 1;
              activitiesHtml += `
                <div class="pdf-item">
                  <div class="pdf-item-time">${act.time || "未定"}</div>
                  <div class="pdf-item-detail">
                    <div class="pdf-item-title">
                      ${act.place_name}
                      ${act.cost ? `<span class="pdf-item-tag">${act.cost}</span>` : ""}
                    </div>
                    <div class="pdf-item-desc">${act.description || ""}</div>
                  </div>
                </div>
              `;
              if (!isLast) {
                activitiesHtml += `
                  <div class="pdf-transit">
                    <div class="pdf-transit-badge">
                      <i class="fas fa-train"></i> 前往下一站
                    </div>
                  </div>
                `;
              }
            });
          }

          htmlContent += `
            <div class="pdf-day-page">
              <div class="pdf-sidebar" style="background-color: ${bgColor};">
                <div class="day-label">DAY</div>
                <div class="day-num">${String(day.day).padStart(2, "0")}</div>
                <div class="day-date">${day.weekday || ""}</div>
              </div>
              <div class="pdf-content">
                <div class="pdf-day-title">${topPlaces}</div>
                ${activitiesHtml}
              </div>
            </div>
          `;
        });

        htmlContent += `</div>`;

        // 3. 將 HTML 字串轉為純粹的虛擬 DOM 節點
        const printElement = document.createElement("div");
        printElement.innerHTML = htmlContent;

        // 4. 設定參數
        const opt = {
          margin: 0,
          filename: "飛遊_精美行程表.pdf",
          image: { type: "jpeg", quality: 0.98 },
          html2canvas: {
            scale: 2,
            useCORS: true,
            scrollY: 0,
            scrollX: 0,
            windowWidth: 800,
          },
          jsPDF: { unit: "px", format: [800, 1131], orientation: "portrait" },
          // 💡 修正 2：利用 jsPDF 內建的換頁功能，強制在每一個 `.pdf-day-page` 前面切一刀
          pagebreak: { mode: "css", before: ".pdf-day-page" },
        };

        try {
          await html2pdf().set(opt).from(printElement).save();
        } catch (err) {
          console.error("PDF 生成失敗:", err);
          alert("抱歉，PDF 產生過程中發生錯誤，請看控制台 (F12) 的詳細訊息。");
        } finally {
          // ==========================================
          // 3. 不管成功或失敗，最後一定要把 Loading 畫面移除
          // ==========================================
          document.body.removeChild(loadingOverlay);
        }
      }

      function navigateToSetup(projectId, projectTitle) {
        if (projectId) {
          sessionStorage.setItem("currentProjectId", projectId);
          sessionStorage.setItem("currentProjectTitle", projectTitle || "");
        }
        sessionStorage.setItem("navigationType", "forward");
        window.location.href = "setup.html";
      }

      spotSearchOverlay.addEventListener("click", function (e) {
        if (e.target === spotSearchOverlay) {
          closeSpotSearchModal();
        }
      });

      spotSearchInput.addEventListener("keydown", onSpotSearchKeydown);

      // 處理鍵盤彈出時的視窗大小變化
      window.visualViewport.addEventListener("resize", function () {
        const inputBar = document.querySelector(".chat-input-bar");
        if (inputBar && isChatMode) {
          // 鍵盤彈出時，調整輸入框位置
          const keyboardHeight =
            window.innerHeight - window.visualViewport.height;
          inputBar.style.bottom = keyboardHeight + "px";
        }
      });

      // 鍵盤收起時恢復位置
      window.visualViewport.addEventListener("scroll", function () {
        const inputBar = document.querySelector(".chat-input-bar");
        if (inputBar && window.visualViewport.height === window.innerHeight) {
          inputBar.style.bottom = "0px";
        }
      });

      const userId = Number(localStorage.getItem("userId"));
      const token = localStorage.getItem("userToken");
      if (!userId || !token) window.location.href = "login.html";
      let isRedirectingToLogin = false;

      function redirectToLoginIfUnauthorized(status, body) {
        if (isRedirectingToLogin) return true;
        if (status === 401 || body?.code === 401) {
          isRedirectingToLogin = true;
          localStorage.removeItem("userToken");
          localStorage.removeItem("userId");
          sessionStorage.clear();
          alert("登入已過期，請重新登入");
          window.location.href = "login.html";
          return true;
        }
        return false;
      }

      function renderProjects(projects) {
        const list = document.querySelector(".trip-list");
        if (!list) return console.error("trip-list 不存在");
        list.innerHTML = "";
        if (!Array.isArray(projects) || projects.length === 0) {
          list.innerHTML = "<div class='empty'>尚無行程</div>";
          return;
        }

        projects.forEach((project) => {
          const item = document.createElement("div");
          item.className = "trip-item";
          item.innerHTML = `
      <div class="trip-info">
        <i class="far fa-bookmark bookmark-icon"></i>
        <div class="trip-text">
          <h4>${project.title || "未命名行程"}</h4>
          <span>${(project.created_at || "").split("T")[0] || ""}</span>
        </div>
      </div>`;
          item.addEventListener("click", () => openProject(project));
          list.appendChild(item);
        });
      }

      async function createNewProject() {
        if (!userId) {
          alert("請先登入再新增行程");
          window.location.href = "login.html";
          return;
        }

        const title = window.prompt("請輸入新行程標題", "我的行程");
        if (!title || !title.trim()) return;

        try {
          const resp = await fetch(`${API_BASE}/api/travel/project`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({
              user_id: userId,
              title: title.trim(),
            }),
          });

          const result = await resp.json().catch(() => ({}));
          if (redirectToLoginIfUnauthorized(resp.status, result)) return;
          if (resp.ok && result.code === 201) {
            const projectId = result.data.project_id;
            const projectTitle = title.trim();

            navigateToSetup(projectId, projectTitle);
          } else {
            alert(result.message || result.error || "新增失敗");
          }
        } catch (err) {
          console.error(err);
          alert("新增失敗，請檢查網路或後端");
        }
      }

      async function loadProjects() {
        if (!userId || !token) {
          console.log("userId/token 未設定，將導向 login");
          window.location.href = "login.html";
          return;
        }

        const res = await fetch(
          `${API_BASE}/api/travel/projects?user_id=${userId}`,
          {
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
          },
        );
        const body = await res.json().catch(() => ({}));
        if (redirectToLoginIfUnauthorized(res.status, body)) return;
        console.log("loadProjects", res.status, body);
        if (res.ok && body.code === 200) {
          renderProjects(body.data);
        } else {
          console.warn("loadProjects 錯誤", res.status, body);
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        loadProjects();
      });

      async function openProject(project) {
        const token = localStorage.getItem("userToken");
        sessionStorage.setItem("currentProjectId", String(project.project_id));
        localStorage.setItem("currentProjectId", String(project.project_id));
        const res = await fetch(
          `${API_BASE}/api/travel/itineraries/${project.project_id}`,
          {
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
          },
        );
        const body = await res.json().catch(() => ({}));
        if (redirectToLoginIfUnauthorized(res.status, body)) return;
        console.log("openProject", res.status, body);

        if (res.ok && body.code === 200 && body.data && body.data.length > 0) {
          // 保存目前選中的 itinerary，供後續 /data/latlng 與 /api/itinerary/detail 使用
          const latestItinerary = body.data[0];
          if (latestItinerary?.itinerary_id) {
            localStorage.setItem(
              "generatedItinerary",
              JSON.stringify({ itinerary_id: latestItinerary.itinerary_id }),
            );
            localStorage.setItem(
              "currentItineraryId",
              String(latestItinerary.itinerary_id),
            );
          }

          // 強制重新載入資料庫資料
          await loadCoordinatesFirst();
          await initMap();
          createDayButtons();
          displayAllDays();

        } else {
          // 沒 itinerary -> 轉 setup
          sessionStorage.setItem("currentProjectId", project.project_id);
          sessionStorage.setItem("currentProjectTitle", project.title);
          sessionStorage.setItem("navigationType", "forward");
          window.location.href = "setup.html";
        }
      }

      // 跳轉到對應景點並開啟簡介
      function focusMarker(id) {
        // 1. 在地圖標記陣列中找到對應的 marker
        const marker = currentMarkers.find((m) => m.activityId === id);

        if (marker) {
          // 2. 地圖平移到該座標
          map.panTo(marker.position);

          // 3. 稍微放大地圖 (可選，增加視覺感)
          map.setZoom(16);

          // 4. 觸發該標記的點擊事件，藉此打開 InfoWindow (簡介)
          // 注意：如果想直接打開，也可以手動調用 currentInfoWindow.open
          google.maps.event.trigger(marker, "click");

          // 5. 自動收起下邊欄 (可選，讓使用者看清楚地圖)
          // 如果不想點了就收起，可以註解掉下面這行
          closeSheet();
        }
      }
    </script>
  </body>
</html>

<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>飛遊 App Prototype</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/index.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
      #map {
        height: 100%;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="menu-btn" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
      </div>
      <div class="header-title">飛遊</div>
      <div class="action-btn" onclick="downloadPDF()">
        <i class="fas fa-download"></i>
      </div>
    </header>

    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="action-btn close-sidebar-btn" onclick="toggleSidebar()">
          <i class="fas fa-chevron-left"></i>
        </div>
      </div>
      <div class="sidebar-content">
        <a onclick="navigateToSetup()" class="new-trip-btn">
          <i class="far fa-square-plus"></i>
          <span>開啟新行程</span>
        </a>
        <hr class="sidebar-divider" />
        <div class="trip-item">
          <div class="trip-info">
            <i
              class="fas fa-bookmark bookmark-icon"
              onclick="toggleBookmark(this)"
            ></i>
            <div class="trip-text">
              <h4>東京三日遊</h4>
              <span>2025/01/10</span>
            </div>
          </div>
        </div>
        <div class="trip-item">
          <div class="trip-info">
            <i
              class="far fa-bookmark bookmark-icon"
              onclick="toggleBookmark(this)"
            ></i>
            <div class="trip-text">
              <h4>大阪當天來回</h4>
              <span>2024/12/20</span>
            </div>
          </div>
        </div>
        <div class="trip-item">
          <div class="trip-info">
            <i
              class="fas fa-bookmark bookmark-icon"
              onclick="toggleBookmark(this)"
            ></i>
            <div class="trip-text">
              <h4>北海道滑雪</h4>
              <span>2024/02/01</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="map-container" id="mapContainer">
      <div class="map-pin pin-1"><i class="fas fa-map-marker-alt"></i></div>
      <div class="map-pin pin-2"><i class="fas fa-map-marker-alt"></i></div>
      <div id="map">
        <!-- 這裡會放置地圖 -->
      </div>
      <div class="fab-group" id="fabGroup">
        <div class="fab" onclick="toggleChatMode()" id="robotFab">
          <i class="fas fa-robot"></i>
        </div>
        <div class="fab" onclick="toggleEditMode()" id="editFab">
          <i class="fas fa-pen"></i>
        </div>
      </div>

      <div class="bottom-sheet" id="bottomSheet">
        <div class="sheet-handle-bar" id="dragHandle">
          <div class="sheet-handle"></div>
        </div>

        <div class="sheet-header" id="dragHeader"></div>

        <div class="sheet-content" id="sheetContent">
          <!-- 聊天視圖 -->
          <div id="chatView" class="view-section">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-bar">
              <input
                type="text"
                class="chat-input-field"
                id="chatInput"
                placeholder="輸入需求..."
              />
              <button class="chat-send-btn" onclick="sendMessage()">
                <i class="fas fa-paper-plane"></i>
              </button>
            </div>
          </div>

          <!-- 原本的行程表視圖 -->
          <div id="timelineView" class="view-section active">
            <div id="timelineList">
              <!-- 行程項目會動態生成在這裡 -->
            </div>
            <div class="add-item-btn" onclick="addItem()">
              <i class="fas fa-plus"></i> 新增行程
            </div>
            <div style="height: 20px"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="spot-search-overlay" id="spotSearchOverlay" aria-hidden="true">
      <div class="spot-search-panel" role="dialog" aria-modal="true">
        <div class="spot-search-input-row">
          <button
            class="spot-search-close"
            type="button"
            onclick="closeSpotSearchModal()"
            aria-label="關閉搜尋"
          >
            <i class="fas fa-close"></i>
          </button>
          <input
            id="spotSearchInput"
            class="spot-search-input"
            type="text"
            placeholder="輸入景點、地標或地址"
          />
        </div>
        <div class="spot-search-status" id="spotSearchStatus">請輸入關鍵字開始搜尋</div>
        <div class="spot-search-results" id="spotSearchResults"></div>
      </div>
    </div>

    <script>
      let map;
      let allDays = [];
      let currentDayIndex = -1;
      const API_BASE = "http://127.0.0.1:5001";

      // 根據日期索引獲取顏色
      function getColorByDay(dayIndex) {
        const colors = ["#2962FF", "#34A853", "#EA4335", "#FBBC04", "#9C27B0"];
        return colors[dayIndex % colors.length];
      }

      // 創建日期按鈕
      function createDayButtons() {
        const timelineView = document.getElementById("timelineView");
        const buttonContainer = document.createElement("div");
        buttonContainer.id = "dayButtonContainer";

        allDays.forEach((day, index) => {
          const btn = document.createElement("button");
          btn.textContent = `第 ${day.day} 天`;
          btn.setAttribute("data-day-index", index);
          btn.onclick = () => switchDay(index, btn);
          buttonContainer.appendChild(btn);
        });

        // 初始化聊天
        window.onload = function () {
          typeMessage(
            "您好！我是飛遊 AI 助手。我可以幫您調整行程、推薦景點、規劃路線，或是回答旅遊相關問題。請告訴我您需要什麼協助？",
            "bot",
          );
        };

        // 切換聊天模式
        function toggleChatMode() {
          isChatMode = !isChatMode;

          if (isChatMode) {
            // 進入聊天模式
            timelineView.classList.remove("active");
            chatView.classList.add("active");
            openSheet();
            fabGroup.classList.add("horizontal");
            document.getElementById("editFab").style.display = "none";

            // 改變圖示：機器人 → 列表
            robotFabIcon.classList.remove("fa-robot");
            robotFabIcon.classList.add("fa-list-ul");
          } else {
            // 回到行程表模式
            chatView.classList.remove("active");
            timelineView.classList.add("active");
            sheet.classList.remove("expanded");
            sheet.classList.remove("half");
            fabGroup.classList.remove("horizontal");
            fabGroup.classList.remove("half-mode");
            document.getElementById("editFab").style.display = "flex";

            // 恢復圖示：列表 → 機器人
            robotFabIcon.classList.remove("fa-list-ul");
            robotFabIcon.classList.add("fa-robot");
          }
        }
        timelineView.insertBefore(buttonContainer, timelineView.firstChild);
      }

      // 添加自定義標記
      function addCustomMarkers(dayActivitiesArray, dayIndex) {
        const { AdvancedMarkerElement } = google.maps;
        const color = getColorByDay(dayIndex);

        dayActivitiesArray.forEach((activities) => {
          activities.forEach((activity) => {
            const markerDiv = document.createElement("div");
            markerDiv.classList.add("custom-marker");
            markerDiv.style.backgroundColor = color;
            markerDiv.textContent = `D${dayIndex + 1}`;

            const infoWindow = new google.maps.InfoWindow({
              content: `
                <div style="padding: 10px;">
                  <strong>${activity.place_name}</strong><br>
                  時間: ${activity.time}<br>
                  類型: ${activity.type}<br>
                  ${activity.cost ? `費用: ${activity.cost}<br>` : ""}
                  描述: ${activity.description}
                </div>
              `,
            });

            const marker = new AdvancedMarkerElement({
              map: map,
              position: activity.location,
              content: markerDiv,
              title: activity.place_name,
            });

            marker.addListener("click", () => {
              infoWindow.open(map, marker);
            });
          });
        });
      }

      typeMessage(
        "好的，我已經理解您的需求。根據您的行程安排，我建議可以在大阪城附近增加大阪歷史博物館，這樣可以更深入了解大阪的歷史文化。另外，從道頓堀到心齋橋的路線非常順暢，中間還可以順道逛逛美國村，那裡有很多特色小店和咖啡廳喔！",
        "bot",
      );

      setTimeout(() => {
        sheet.classList.remove("expanded");
        sheet.classList.add("half");
        fabGroup.classList.remove("horizontal");
        fabGroup.classList.add("half-mode");
      }, 1000);

      // 逐字顯示訊息（打字機效果）
      function typeMessage(text, type, speed = 30) {
        const div = document.createElement("div");
        div.className = `chat-msg ${type}`;
        document.getElementById("chatMessages").appendChild(div);

        let index = 0;
        const interval = setInterval(() => {
          if (index < text.length) {
            div.textContent += text[index];
            index++;
            scrollToBottom();
          } else {
            clearInterval(interval);
          }
        }, speed);

        return div;
      }

      function appendMsg(text, type) {
        const div = document.createElement("div");
        div.className = `chat-msg ${type}`;
        div.textContent = text;
        document.getElementById("chatMessages").appendChild(div);
        scrollToBottom();
      }
      // 載入單天時間線
      function loadSingleDayTimeline(day, dayIndex) {
        const timelineList = document.getElementById("timelineList");

        // 移除舊的日期標題和活動
        const oldDayTitles = timelineList.querySelectorAll("[data-day-title]");
        const oldItems = timelineList.querySelectorAll(".timeline-item");

        oldDayTitles.forEach((el) => el.remove());
        oldItems.forEach((el) => el.remove());

        // 添加該天的日期標題
        const dayTitle = document.createElement("div");
        dayTitle.setAttribute("data-day-title", "true");
        dayTitle.textContent = `第 ${day.day} 天 - ${day.weekday}`;
        timelineList.appendChild(dayTitle);

        // 添加該天的所有活動
        day.activities.forEach((activity, actIndex) => {
          const isLast = actIndex === day.activities.length - 1;
          const photoUrl = activity.photos && activity.photos[0] 
            ? activity.photos[0].photo_url
            : '';
          
          const newItemHTML = `
            <div class="delete-btn" onclick="deleteItem(this)"><i class="fas fa-trash"></i></div>
            <div class="timeline-left">
              <div class="location-img" ${photoUrl ? `style="background-image: url('${photoUrl}'); background-size: cover; background-position: center;"` : ''}><i class="far fa-image" ${photoUrl ? 'style="display: none;"' : ''}></i></div>
              ${!isLast ? '<div class="timeline-connector"></div>' : ''}
            </div>
            <div class="timeline-right">
              <div class="timeline-title">
                ${activity.place_name}
                <span class="time-badge">${activity.time}</span>
              </div>
              <div class="timeline-desc">${activity.description}</div>
              ${activity.cost ? `<div class="activity-cost">💰 ${activity.cost}</div>` : ""}
            </div>
          `;

          const div = document.createElement("div");
          div.className = "timeline-item";
          div.innerHTML = newItemHTML;
          timelineList.appendChild(div);
        });
      }

      // 載入所有活動的時間線
      function loadAllTimelineActivities() {
        const timelineList = document.getElementById("timelineList");

        // 移除舊的日期標題和活動
        const oldDayTitles = timelineList.querySelectorAll("[data-day-title]");
        const oldItems = timelineList.querySelectorAll(".timeline-item");

        oldDayTitles.forEach((el) => el.remove());
        oldItems.forEach((el) => el.remove());

        allDays.forEach((day, dayIndex) => {
          const dayTitle = document.createElement("div");
          dayTitle.setAttribute("data-day-title", "true");
          dayTitle.textContent = `第 ${day.day} 天 - ${day.weekday}`;
          timelineList.appendChild(dayTitle);

          day.activities.forEach((activity, actIndex) => {
            const isLast = actIndex === day.activities.length - 1;
            const photoUrl = activity.photos && activity.photos[0] 
              ? activity.photos[0].photo_url
              : '';
            
            const newItemHTML = `
              <div class="delete-btn" onclick="deleteItem(this)"><i class="fas fa-trash"></i></div>
              <div class="timeline-left">
                <div class="location-img" ${photoUrl ? `style="background-image: url('${photoUrl}'); background-size: cover; background-position: center;"` : ''}><i class="far fa-image" ${photoUrl ? 'style="display: none;"' : ''}></i></div>
                ${!isLast ? '<div class="timeline-connector"></div>' : ''}
              </div>
              <div class="timeline-right">
                <div class="timeline-title">
                  ${activity.place_name}
                  <span class="time-badge">${activity.time}</span>
                </div>
                <div class="timeline-desc">${activity.description}</div>
                ${activity.cost ? `<div class="activity-cost">💰 ${activity.cost}</div>` : ""}
              </div>
            `;

            const div = document.createElement("div");
            div.className = "timeline-item";
            div.innerHTML = newItemHTML;
            timelineList.appendChild(div);
          });
        });
      }

      // 顯示所有天的行程
      function displayAllDays() {
        const { DirectionsService, DirectionsRenderer } = google.maps;

        allDays.forEach((day, dayIndex) => {
          if (!day || !day.activities || day.activities.length < 2) {
            console.warn(`第 ${dayIndex + 1} 天沒有足夠的活動`);
            return;
          }

          const activities = day.activities;
          const directionsService = new DirectionsService();

          const directionsRenderer = new DirectionsRenderer({
            map: map,
            suppressMarkers: false,
            polylineOptions: {
              strokeColor: getColorByDay(dayIndex),
              strokeWeight: 7,
              strokeOpacity: 0.6,
            },
          });

          const origin = activities[0].location;
          const destination = activities[activities.length - 1].location;
          const waypoints = activities.slice(1, -1).map((act) => ({
            location: act.location,
            stopover: true,
          }));

          directionsService.route(
            {
              origin: origin,
              destination: destination,
              waypoints: waypoints,
              optimizeWaypoints: false,
              travelMode: google.maps.TravelMode.DRIVING,
            },
            (result, status) => {
              if (status === "OK") {
                directionsRenderer.setDirections(result);
              } else {
                console.error(`第 ${dayIndex + 1} 天路線規劃失敗:`, status);
              }
            },
          );
        });

        loadAllTimelineActivities();
      }

      // 顯示單一天的行程
      function displayDay(dayIndex) {
        const day = allDays[dayIndex];

        if (!day || !day.activities || day.activities.length < 2) {
          console.error("該日期沒有足夠的活動");
          return;
        }

        const activities = day.activities;
        const { DirectionsService, DirectionsRenderer } = google.maps;

        const directionsService = new DirectionsService();
        const directionsRenderer = new DirectionsRenderer({
          map: map,
          suppressMarkers: false,
          polylineOptions: {
            strokeColor: getColorByDay(dayIndex),
            strokeWeight: 7,
            strokeOpacity: 0.9,
          },
        });

        const origin = activities[0].location;
        const destination = activities[activities.length - 1].location;
        const waypoints = activities.slice(1, -1).map((act) => ({
          location: act.location,
          stopover: true,
        }));

        directionsService.route(
          {
            origin: origin,
            destination: destination,
            waypoints: waypoints,
            optimizeWaypoints: false,
            travelMode: google.maps.TravelMode.DRIVING,
          },
          (result, status) => {
            if (status === "OK") {
              directionsRenderer.setDirections(result);
              // 載入該天的時間線
              loadSingleDayTimeline(day, dayIndex);
            } else {
              console.error("路線規劃失敗:", status);
            }
          },
        );
      }

      // 切換日期
      function switchDay(dayIndex, clickedBtn) {
        currentDayIndex = dayIndex;

        // 更新按鈕樣式
        const allBtns = document.querySelectorAll("#dayButtonContainer button");
        allBtns.forEach((btn, index) => {
          if (index === dayIndex) {
            btn.classList.add("active");
          } else {
            btn.classList.remove("active");
          }
        });

        displayDay(dayIndex);
      }

      async function initMap() {
        try {
          const response = await fetch(`${API_BASE}/api/itinerary`);

          if (!response.ok) {
            throw new Error(`itinerary API ${response.status}`);
          }

          const result = await response.json();
          allDays = result.data.days;

          // 計算所有景點的平均座標
          let totalLat = 0;
          let totalLng = 0;
          let pointCount = 0;

          allDays.forEach((day) => {
            day.activities.forEach((activity) => {
              if (
                activity.location &&
                activity.location.lat &&
                activity.location.lng
              ) {
                totalLat += activity.location.lat;
                totalLng += activity.location.lng;
                pointCount++;
              }
            });
          });

          const avgLat = pointCount > 0 ? totalLat / pointCount : 35.6762;
          const avgLng = pointCount > 0 ? totalLng / pointCount : 139.6503;

          const { Map } = await google.maps.importLibrary("maps");
          map = new Map(document.getElementById("map"), {
            zoom: 8.5,
            center: { lat: avgLat, lng: avgLng },
            mapId: "DEMO_MAP_ID",
          });

          createDayButtons();
          displayAllDays();
        } catch (error) {
          console.error("初始化地圖失敗：", error);
        }
      }

      fetch(`${API_BASE}/api/google-key`)
        .then((res) => res.json())
        .then((data) => {
          const script = document.createElement("script");
          script.src = `https://maps.googleapis.com/maps/api/js?key=${data.key}&callback=initMap&libraries=routes&loading=async`;
          script.async = true;
          document.head.appendChild(script);
        });
    </script>

    <script>
      const sidebar = document.getElementById("sidebar");
      const overlay = document.querySelector(".sidebar-overlay");
      const sheet = document.getElementById("bottomSheet");
      const fabGroup = document.getElementById("fabGroup");
      const mapContainer = document.getElementById("mapContainer");
      const dragHandle = document.getElementById("dragHandle");
      const dragHeader = document.getElementById("dragHeader");

      let isEditMode = false;
      let isChatMode = false;
      const timelineView = document.getElementById("timelineView");
      const chatView = document.getElementById("chatView");
      const editFab = document.getElementById("editFab").querySelector("i");
      const robotFabIcon = document
        .getElementById("robotFab")
        .querySelector("i");

      // --- 行程搜尋相關變數 ---
      const spotSearchOverlay = document.getElementById("spotSearchOverlay");
      const spotSearchInput = document.getElementById("spotSearchInput");
      const spotSearchStatus = document.getElementById("spotSearchStatus");
      const spotSearchResults = document.getElementById("spotSearchResults");

      const spotSearchState = {
        isOpen: false,
        results: [],
        selectedIndex: -1,
        debounceTimer: null,
        requestId: 0,
      };

      // --- SortableJS 設定 (拖拽功能) ---
      const timelineList = document.getElementById("timelineList");

      let sortable = new Sortable(timelineList, {
        animation: 150,
        disabled: true,
        delay: 400,
        delayOnTouchOnly: true,
        ghostClass: "sortable-ghost",
        dragClass: "sortable-drag",
      });

      // 初始化聊天
      function showGeneratedRawOutputInChat() {
        const raw = localStorage.getItem("last_itinerary_response");
        if (!raw) return;

        try {
          const payload = JSON.parse(raw);
          const rawOutput = payload?.data?.raw_output;

          if (!rawOutput) return;

          // 自動切到聊天視圖
          if (!isChatMode) {
            toggleChatMode();
          }

          // 顯示 raw_output（可讀格式）
          let displayText = rawOutput;
          try {
            const obj = JSON.parse(rawOutput);
            displayText = JSON.stringify(obj, null, 2);
          } catch (_) {}

          appendMsg(displayText, "bot");

          // 避免重整一直重複顯示
          localStorage.removeItem("last_itinerary_response");
        } catch (e) {
          console.error("讀取行程回應失敗:", e);
        }
      }

      // 初始化聊天（原本的測試訊息請移除）
      window.onload = function () {
        showGeneratedRawOutputInChat();
      };

      // 切換聊天模式
      function toggleChatMode() {
        isChatMode = !isChatMode;

        if (isChatMode) {
          // 進入聊天模式
          timelineView.classList.remove("active");
          chatView.classList.add("active");
          openSheet();
          fabGroup.classList.add("horizontal");
          document.getElementById("editFab").style.display = "none";

          // 改變圖示：機器人 → 列表
          robotFabIcon.classList.remove("fa-robot");
          robotFabIcon.classList.add("fa-list-ul");

          setTimeout(() => document.getElementById("chatInput").focus(), 300);
        } else {
          // 回到行程表模式
          chatView.classList.remove("active");
          timelineView.classList.add("active");
          sheet.classList.remove("expanded");
          sheet.classList.remove("half");
          fabGroup.classList.remove("horizontal");
          fabGroup.classList.remove("half-mode");
          document.getElementById("editFab").style.display = "flex";

          // 恢復圖示：列表 → 機器人
          robotFabIcon.classList.remove("fa-list-ul");
          robotFabIcon.classList.add("fa-robot");
        }
      }

      // 發送訊息
      function sendMessage() {
        const input = document.getElementById("chatInput");
        const text = input.value.trim();
        if (!text) return;

        appendMsg(text, "user");
        input.value = "";

        const loadingId = "loading-" + Date.now();
        document
          .getElementById("chatMessages")
          .insertAdjacentHTML(
            "beforeend",
            `<div class="typing" id="${loadingId}"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`,
          );
        scrollToBottom();

        setTimeout(() => {
          document.getElementById(loadingId).remove();

          setTimeout(() => {
            appendMsg("測試訊息", "bot");
            sheet.classList.remove("expanded");
            sheet.classList.add("half");
            fabGroup.classList.remove("horizontal");
            fabGroup.classList.add("half-mode");
          }, 1000);
        }, 1500);
      }

      function appendMsg(text, type) {
        const div = document.createElement("div");
        div.className = `chat-msg ${type}`;
        div.textContent = text;
        document.getElementById("chatMessages").appendChild(div);
        scrollToBottom();
      }

      function scrollToBottom() {
        const container = document.getElementById("chatMessages");
        container.scrollTop = container.scrollHeight;
      }

      // 編輯模式切換
      function toggleEditMode() {
        event.stopPropagation();
        isEditMode = !isEditMode;

        if (isEditMode) {
          timelineView.classList.add("editing");
          editFab.classList.remove("fa-pen");
          editFab.classList.add("fa-check");
          openSheet();
          sortable.option("disabled", false);
        } else {
          timelineView.classList.remove("editing");
          editFab.classList.remove("fa-check");
          editFab.classList.add("fa-pen");
          sortable.option("disabled", true);
        }
      }

      function deleteItem(btnElement) {
        const item = btnElement.closest(".timeline-item");
        if (item) {
          item.style.opacity = "0";
          item.style.transform = "translateX(-20px)";
          setTimeout(() => {
            item.remove();
          }, 300);
        }
      }

      // --- 行程搜尋相關功能 ---
      function openSpotSearchModal() {
        spotSearchState.isOpen = true;
        spotSearchState.results = [];
        spotSearchState.selectedIndex = -1;

        spotSearchOverlay.classList.add("active");
        spotSearchOverlay.setAttribute("aria-hidden", "false");
        spotSearchResults.innerHTML = "";
        spotSearchStatus.textContent = "";
        spotSearchInput.value = "";

        setTimeout(() => {
          spotSearchInput.focus(); // 動畫結束後才聚焦
        }, 50);
      }
      // 關閉搜尋視窗
      function closeSpotSearchModal() {
        spotSearchState.isOpen = false;
        spotSearchOverlay.classList.remove("active");
        spotSearchOverlay.setAttribute("aria-hidden", "true");

        if (spotSearchState.debounceTimer) {
          clearTimeout(spotSearchState.debounceTimer);
          spotSearchState.debounceTimer = null;
        }
      }

      // 渲染搜尋結果列表
      function renderSpotSearchResults() {
        if (!spotSearchState.results.length) {
          spotSearchResults.innerHTML = "";
          return;
        }

        const html = spotSearchState.results
          .map((item, index) => {
            const isSelected = index === spotSearchState.selectedIndex;
            const photoUrl =
              item.photos && item.photos[0] && item.photos[0].photo_url
                ? item.photos[0].photo_url
                : "";
            return `
              <button
                type="button"
                class="spot-search-item ${isSelected ? "active" : ""}"
                onclick="selectSpotSearchResult(${index})"
              >
                <div class="spot-search-item-thumb ${photoUrl ? "has-photo" : ""}" ${photoUrl ? `style="background-image:url('${photoUrl}')"` : ""}>
                  ${photoUrl ? "" : '<i class="far fa-image"></i>'}
                </div>
                <div class="spot-search-item-body">
                  <div class="spot-search-item-main">${item.name || "未命名地點"}</div>
                  <div class="spot-search-item-sub">${item.address || "無地址資訊"}</div>
                </div>
              </button>
            `;
          })
          .join("");

        spotSearchResults.innerHTML = html;
      }

      function selectSpotSearchResult(index) {
        spotSearchState.selectedIndex = index;
        renderSpotSearchResults();
      }
      // 從行程活動中嘗試獲取一個有效的座標位置，作為搜尋的錨點
      function normalizeActivityLocation(location) {
        if (!location) return null;

        const lat =
          typeof location.lat === "number"
            ? location.lat
            : typeof location.latitude === "number"
              ? location.latitude
              : null;

        const lng =
          typeof location.lng === "number"
            ? location.lng
            : typeof location.longitude === "number"
              ? location.longitude
              : null;

        if (lat === null || lng === null) return null;
        return { latitude: lat, longitude: lng };
      }

      // 優先使用當前日期的最後一個活動位置，若無則從所有日期的最後活動往前找
      function getSearchAnchorLocation() {
        const getDayLastLocation = (day) => {
          if (!day || !Array.isArray(day.activities) || !day.activities.length) {
            return null;
          }

          for (let i = day.activities.length - 1; i >= 0; i--) {
            const normalized = normalizeActivityLocation(day.activities[i].location);
            if (normalized) return normalized;
          }
          return null;
        };

        if (currentDayIndex >= 0 && currentDayIndex < allDays.length) {
          const byCurrentDay = getDayLastLocation(allDays[currentDayIndex]);
          if (byCurrentDay) return byCurrentDay;
        }

        for (let i = allDays.length - 1; i >= 0; i--) {
          const byLastDay = getDayLastLocation(allDays[i]);
          if (byLastDay) return byLastDay;
        }

        return null;
      }

      // 執行景點搜尋
      async function performSpotSearch(keyword, reqId, showNoResultMessage = false) {
        try {
          // 嘗試使用錨點位置進行附近搜尋，若失敗或無結果則退回文字搜尋
          const anchorLocation = getSearchAnchorLocation();
          let response;
          let payload;
          let useNearbyEndpoint = false;

          if (anchorLocation) {
            response = await fetch(`${API_BASE}/api/maps/search_nearby`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                textQuery: keyword,
                location: anchorLocation,
                radius: 1500,
                languageCode: "zh-TW",
                maxResultCount: 8,
              }),
            });
            payload = await response.json();
            useNearbyEndpoint = response.ok && payload.success;
          }

          // nearby 無結果/失敗時，退回原本文字搜尋
          if (!useNearbyEndpoint) {
            response = await fetch(`${API_BASE}/api/maps/search`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                textQuery: keyword,
                languageCode: "zh-TW",
                maxResultCount: 10,
              }),
            });

            payload = await response.json(); 
          } 

          if (reqId !== spotSearchState.requestId || !spotSearchState.isOpen) {
            return;
          }

          const places = payload?.data?.places || [];
          spotSearchState.results = places;
          spotSearchState.selectedIndex = -1;

          if (!response.ok || !payload.success) {
            spotSearchStatus.textContent = payload.error || "搜尋失敗，請稍後再試";
            spotSearchResults.innerHTML = "";
            return;
          }

          if (!places.length) {
            spotSearchStatus.textContent = showNoResultMessage
              ? "找不到相關景點，請嘗試其他關鍵字"
              : "";
            spotSearchResults.innerHTML = "";
            return;
          }

          spotSearchStatus.textContent = "";

          renderSpotSearchResults();
        } catch (error) {
          if (reqId !== spotSearchState.requestId || !spotSearchState.isOpen) {
            return;
          }
          spotSearchStatus.textContent = "搜尋失敗，請檢查網路或稍後再試";
          spotSearchResults.innerHTML = "";
        }
      }

      function triggerSpotSearch(showNoResultMessage = false) {
        const keyword = spotSearchInput.value.trim();
        if (!keyword) {
          spotSearchStatus.textContent = "";
          spotSearchResults.innerHTML = "";
          return;
        }

        const anchorLocation = getSearchAnchorLocation();
        if (anchorLocation && map && typeof map.panTo === "function") {
          map.panTo({
            lat: anchorLocation.latitude,
            lng: anchorLocation.longitude,
          });
        }

        spotSearchState.requestId += 1;
        const currentReqId = spotSearchState.requestId;

        spotSearchStatus.textContent = "";
        spotSearchResults.innerHTML = "";
        performSpotSearch(keyword, currentReqId, showNoResultMessage);
      }

      function onSpotSearchInput() {
        if (spotSearchState.debounceTimer) {
          clearTimeout(spotSearchState.debounceTimer);
        }
      
        spotSearchState.debounceTimer = setTimeout(() => {
          if (!spotSearchState.isOpen) return;
          triggerSpotSearch();
        }, 350);
      }

      function onSpotSearchKeydown(e) {
        if (e.key === "Enter") {
          e.preventDefault();
          triggerSpotSearch(true);
          return;
        }

        if (e.key === "Escape") {
          closeSpotSearchModal();
        }
      }

      // 新增行程項目（打開搜尋視窗）
      function addItem() {
        openSpotSearchModal();
      }

      function toggleSidebar() {
        sidebar.classList.toggle("active");
        overlay.classList.toggle("active");
      }

      function toggleBookmark(iconElement) {
        event.stopPropagation();
        if (iconElement.classList.contains("fas")) {
          iconElement.classList.remove("fas");
          iconElement.classList.add("far");
        } else {
          iconElement.classList.remove("far");
          iconElement.classList.add("fas");
        }
      }

      function openSheet() {
        sheet.classList.add("expanded");
        sheet.classList.remove("half", "half-mode");
        fabGroup.classList.add("horizontal");
        fabGroup.classList.remove("half-mode");
      }

      function closeSheet() {
        if (isEditMode) toggleEditMode();
        sheet.classList.remove("expanded");
        fabGroup.classList.remove("horizontal");
      }

      function toggleBottomSheet() {
        if (sheet.classList.contains("expanded")) {
          closeSheet();
        } else {
          openSheet();
        }
      }

      dragHandle.addEventListener("click", toggleBottomSheet);
      dragHeader.addEventListener("click", toggleBottomSheet);

      let startY = 0;
      const threshold = 50;
      function handleTouchStart(e) {
        startY = e.touches[0].clientY;
      }
      function handleTouchEnd(e) {
        let endY = e.changedTouches[0].clientY;
        let distance = startY - endY;
        if (distance > threshold) openSheet();
        else if (distance < -threshold) closeSheet();
      }

      dragHandle.addEventListener("touchstart", handleTouchStart, {
        passive: true,
      });
      dragHandle.addEventListener("touchend", handleTouchEnd);
      dragHeader.addEventListener("touchstart", handleTouchStart, {
        passive: true,
      });
      dragHeader.addEventListener("touchend", handleTouchEnd);

      mapContainer.addEventListener("click", function (e) {
        if (
          !sheet.contains(e.target) &&
          !fabGroup.contains(e.target) &&
          sheet.classList.contains("expanded")
        ) {
          closeSheet();
        }
      });

      function downloadPDF() {
        alert("正在下載行程 PDF 檔案...");
      }

      document
        .getElementById("chatInput")
        .addEventListener("keypress", function (e) {
          if (e.key === "Enter") {
            e.preventDefault();
            sendMessage();
          }
        });

      function navigateToSetup() {
        sessionStorage.setItem("navigationType", "forward");
        window.location.href = "setup.html";
      }

      spotSearchOverlay.addEventListener("click", function (e) {
        if (e.target === spotSearchOverlay) {
          closeSpotSearchModal();
        }
      });

      spotSearchInput.addEventListener("input", onSpotSearchInput);
      spotSearchInput.addEventListener("keydown", onSpotSearchKeydown);

      // 處理鍵盤彈出時的視窗大小變化
      window.visualViewport.addEventListener("resize", function () {
        const inputBar = document.querySelector(".chat-input-bar");
        if (inputBar && isChatMode) {
          // 鍵盤彈出時，調整輸入框位置
          const keyboardHeight =
            window.innerHeight - window.visualViewport.height;
          inputBar.style.bottom = keyboardHeight + "px";
        }
      });

      // 鍵盤收起時恢復位置
      window.visualViewport.addEventListener("scroll", function () {
        const inputBar = document.querySelector(".chat-input-bar");
        if (inputBar && window.visualViewport.height === window.innerHeight) {
          inputBar.style.bottom = "0px";
        }
      });
    </script>
  </body>
</html>
